substitutions:
  node_name: guition-p4-7inch-ha
  friendly_name: Guition P4 7inch HA Panel
  board_type: esp32-p4-evboard
  rotate_display: "0"
  immich_url: !secret immich_server_url
  immich_slideshow_interval: 10min
  idle_timeout: 30s
  fallback_ap_ssid: !secret fallback_ap_ssid

  # Dashboard tiles — replace entity IDs with your own HA entities.
  # For scenes, change homeassistant.toggle → scene.turn_on in display_touch_board.yaml.
  tile1_entity: light.living_room
  tile1_label: Living Room
  tile2_entity: light.bedroom
  tile2_label: Bedroom
  tile3_entity: switch.fan
  tile3_label: Fan
  tile4_entity: switch.tv
  tile4_label: TV
  tile5_entity: scene.evening
  tile5_label: Evening Scene
  tile6_entity: scene.morning
  tile6_label: Morning Scene

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  project:
    name: local.home_assistant_p4_c6_panel
    version: "0.2.0"

esp32:
  board: ${board_type}
  flash_size: 16MB
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
    sdkconfig_options:
      CONFIG_SPIRAM_XIP_FROM_PSRAM: y

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

esp32_hosted:
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

packages:
  core: !include packages/core_ha.yaml
  display_touch: !include packages/display_touch_board.yaml
  audio_voice: !include packages/audio_voice_board.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: !secret panel_use_address
  on_connect:
    - script.execute: refresh_immich_slideshow
  ap:
    ssid: !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:
