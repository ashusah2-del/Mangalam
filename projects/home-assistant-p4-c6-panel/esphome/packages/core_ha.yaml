logger:
  level: DEBUG

json:

http_request:
  timeout: 10s
  follow_redirects: true
  useragent: GuitionP4Panel/1.0

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 400kHz
  id: bus_a

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - globals.set:
        id: g_ha_connected
        value: 'true'
    - lvgl.widget.hide: ha_disconnected_overlay
    - lvgl.widget.show: tap_zone_btn
    - lvgl.label.update:
        id: dash_error_lbl
        text: ""
    - voice_assistant.start_continuous:
  on_client_disconnected:
    - globals.set:
        id: g_ha_connected
        value: 'false'
    - lvgl.widget.show: ha_disconnected_overlay
    - lvgl.widget.hide: tap_zone_btn
    - lvgl.page.show: slideshow_page
    - lvgl.label.update:
        id: dash_error_lbl
        text: "Home Assistant disconnected"
    - voice_assistant.stop:

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Panel IP Address"
    ssid:
      name: "Panel Wi-Fi SSID"

  # Allows overriding the Immich base URL from HA without reflashing
  - platform: homeassistant
    id: ha_immich_url_sensor
    entity_id: input_text.panel_immich_url
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!x.empty()) id(immich_base_url) = x.c_str();
        - script.execute: refresh_immich_slideshow

  # Calendar events pushed from HA automation into input_text.panel_calendar_events
  - platform: homeassistant
    id: ha_calendar_events
    entity_id: input_text.panel_calendar_events
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: calendar_events_lbl
            text: !lambda |-
              return x.empty() ? std::string("No events") : x;

  # Tile entity states — update dashboard tile labels when HA state changes
  - platform: homeassistant
    id: tile1_ha_state
    entity_id: "${tile1_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: tile1_state_lbl
            text: !lambda return x;
  - platform: homeassistant
    id: tile2_ha_state
    entity_id: "${tile2_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: tile2_state_lbl
            text: !lambda return x;
  - platform: homeassistant
    id: tile3_ha_state
    entity_id: "${tile3_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: tile3_state_lbl
            text: !lambda return x;
  - platform: homeassistant
    id: tile4_ha_state
    entity_id: "${tile4_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: tile4_state_lbl
            text: !lambda return x;
  - platform: homeassistant
    id: tile5_ha_state
    entity_id: "${tile5_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: tile5_state_lbl
            text: !lambda return x;
  - platform: homeassistant
    id: tile6_ha_state
    entity_id: "${tile6_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: tile6_state_lbl
            text: !lambda return x;

sensor:
  - platform: uptime
    name: "Panel Uptime"
  - platform: wifi_signal
    name: "Panel Wi-Fi RSSI"
    id: panel_wifi_rssi
    update_interval: 30s

binary_sensor:
  - platform: status
    name: "Panel Online"
