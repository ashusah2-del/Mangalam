logger:
  level: DEBUG

json:

http_request:
  timeout: 15s
  follow_redirects: true
  verify_ssl: false
  useragent: GuitionP4Panel/1.0

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 400kHz
  id: bus_a

api:
  encryption:
    key: !secret api_encryption_key
  # Default is 5; we've seen the dashboard's stuck "esphome logs" subprocesses
  # plus HA + an occasional debug session exhaust slots and lock out HA.
  max_connections: 12
  # Only run setup/teardown on first-connect / last-disconnect.
  # Multiple clients connect (HA, log streams, etc.) — running refresh and
  # voice_assistant.start_continuous on every connect blocked the API loop
  # and cascaded into socket exhaustion.
  on_client_connected:
    - globals.set:
        id: g_ha_client_count
        value: !lambda 'return id(g_ha_client_count) + 1;'
    - if:
        condition:
          lambda: 'return id(g_ha_client_count) == 1;'
        then:
          - globals.set:
              id: g_ha_connected
              value: 'true'
          - lvgl.widget.hide: ha_disconnected_overlay
          - lvgl.widget.show: tap_zone_btn
          - lvgl.label.update:
              id: dash_error_lbl
              text: ""
          - script.execute: refresh_immich_slideshow
          - voice_assistant.start_continuous:
  on_client_disconnected:
    - globals.set:
        id: g_ha_client_count
        value: !lambda |-
          int c = id(g_ha_client_count) - 1;
          return c < 0 ? 0 : c;
    - if:
        condition:
          lambda: 'return id(g_ha_client_count) == 0;'
        then:
          - globals.set:
              id: g_ha_connected
              value: 'false'
          - lvgl.widget.show: ha_disconnected_overlay
          - lvgl.widget.hide: tap_zone_btn
          - lvgl.page.show: slideshow_page
          - lvgl.label.update:
              id: dash_error_lbl
              text: "Home Assistant disconnected"
          - voice_assistant.stop:

ota:
  - platform: esphome
    password: !secret ota_password

# After repeated boot crashes the device enters safe mode (OTA-only, no user
# code) for 1 minute — gives a reliable window to OTA-flash a fixed firmware
# even if normal boot crashes immediately.
safe_mode:
  boot_is_good_after: 60s
  reboot_timeout: 1min
  num_attempts: 5

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Panel IP Address"
      id: wifi_ip_addr
    ssid:
      name: "Panel Wi-Fi SSID"

  # Displays proxy URL in settings; no auto-refresh on change to avoid
  # cascading download attempts every time HA pushes a state update.
  - platform: homeassistant
    id: ha_immich_url_sensor
    entity_id: input_text.panel_immich_url
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!x.empty()) id(immich_base_url) = x.c_str();

  # Slideshow refresh interval, in minutes. Reads from HA helper
  # input_number.panel_slideshow_interval (recommended range 1–1440 minutes;
  # create with min=1, max=1440, step=1 mode=box). Clamped here so a bad
  # value in HA can't break the timer logic. The 1-minute interval block
  # in display_touch_board.yaml reads g_slideshow_interval_min on every tick.
  - platform: homeassistant
    id: ha_slideshow_interval
    entity_id: input_number.panel_slideshow_interval
    internal: true
    on_value:
      then:
        - lambda: |-
            int v = (int)atof(x.c_str());
            if (v < 1) v = 1;
            if (v > 1440) v = 1440;
            id(g_slideshow_interval_min) = v;
            id(g_slideshow_counter_min) = 0;
            // Keep the settings-page spinner label in sync with whatever
            // value HA pushes (e.g. somebody nudges the helper in HA UI).
            char b[12];
            snprintf(b, sizeof(b), "%d min", v);
            lv_label_set_text(id(settings_interval_val), b);

  # Weather location label — text driven by HA helper
  # input_text.panel_weather_city. The weather entity's friendly_name is
  # "Forecast Home" and it has no city attribute, so a dedicated HA helper
  # is the cleanest source. Create:
  #   Settings → Devices & Services → Helpers → Text
  #   Name "Panel Weather City", entity_id input_text.panel_weather_city
  - platform: homeassistant
    id: ha_weather_city
    entity_id: input_text.panel_weather_city
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!id(g_lvgl_ready)) return;
            if (x.empty()) return;
            lv_label_set_text(id(wx_location_lbl), x.c_str());

  # ─── Weather widget — state drives which mdi:weather-* icon is visible
  # and its tint; temperature attribute fills the big number.
  - platform: homeassistant
    id: ha_weather_state
    entity_id: "${weather_entity}"
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!id(g_lvgl_ready)) return;  // LVGL not ready yet, skip
            struct WxRow { const char* state; lv_obj_t* widget; uint32_t color; const char* label; };
            WxRow rows[] = {
              {"sunny",            id(wx_sunny),        0xFFD700, "Sunny"},
              {"clear-night",      id(wx_night),        0xAACCFF, "Clear night"},
              {"cloudy",           id(wx_cloudy),       0xCCCCCC, "Cloudy"},
              {"partlycloudy",     id(wx_partlycloudy), 0xDDDDDD, "Partly cloudy"},
              {"rainy",            id(wx_rainy),        0x66BBFF, "Rainy"},
              {"pouring",          id(wx_rainy),        0x4499FF, "Pouring"},
              {"snowy",            id(wx_snowy),        0xEEFFFF, "Snowy"},
              {"snowy-rainy",      id(wx_snowy),        0xCCDDFF, "Sleet"},
              {"hail",             id(wx_snowy),        0xCCDDFF, "Hail"},
              {"fog",              id(wx_fog),          0xBBBBBB, "Fog"},
              {"lightning",        id(wx_lightning),    0xFFCC44, "Lightning"},
              {"lightning-rainy",  id(wx_lightning),    0xFFAA00, "Storm"},
              {"windy",            id(wx_windy),        0xAACCDD, "Windy"},
              {"windy-variant",    id(wx_windy),        0xAACCDD, "Windy"},
              {"exceptional",      id(wx_lightning),    0xFF6644, "Extreme"},
            };
            // Hide every weather icon first.
            lv_obj_t* all_icons[] = {
              id(wx_sunny), id(wx_night), id(wx_cloudy), id(wx_partlycloudy),
              id(wx_rainy), id(wx_snowy), id(wx_fog), id(wx_lightning), id(wx_windy)
            };
            for (auto* w : all_icons) lv_obj_add_flag(w, LV_OBJ_FLAG_HIDDEN);
            // Find a matching row.
            const char* label = "—";
            uint32_t color = 0xCCCCCC;
            lv_obj_t* show = id(wx_cloudy);
            for (auto& row : rows) {
              if (x == row.state) {
                show = row.widget;
                color = row.color;
                label = row.label;
                break;
              }
            }
            lv_obj_clear_flag(show, LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_style_img_recolor(show, lv_color_hex(color), 0);
            lv_obj_set_style_img_recolor_opa(show, LV_OPA_COVER, 0);
            lv_label_set_text(id(wx_cond_lbl), label);
            lv_obj_set_style_text_color(id(wx_cond_lbl), lv_color_hex(color), 0);

  - platform: homeassistant
    id: ha_weather_temp
    entity_id: "${weather_entity}"
    attribute: temperature
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!id(g_lvgl_ready)) return;
            // Temperature comes through as "16.0" / "-3.2" etc.; trim the
            // .0 and tack on °. atof handles negatives + decimals cleanly.
            float t = atof(x.c_str());
            char b[12];
            snprintf(b, sizeof(b), "%d\xC2\xB0", (int)(t + (t >= 0 ? 0.5f : -0.5f)));
            lv_label_set_text(id(wx_temp_lbl), b);

  - platform: homeassistant
    id: ha_weather_humidity
    entity_id: "${weather_entity}"
    attribute: humidity
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!id(g_lvgl_ready)) return;
            float h = atof(x.c_str());
            char b[12];
            snprintf(b, sizeof(b), "%d%% RH", (int)(h + 0.5f));
            lv_label_set_text(id(wx_humidity_lbl), b);

  # Calendar overlay opacity in %, paired with HA helper
  # input_number.panel_calendar_opacity (recommended range 0–100 step 5
  # mode=Box). Drives the bg_opa of calendar_panel on the slideshow page.
  - platform: homeassistant
    id: ha_calendar_opacity
    entity_id: input_number.panel_calendar_opacity
    internal: true
    on_value:
      then:
        - lambda: |-
            int v = (int)atof(x.c_str());
            if (v < 0) v = 0;
            if (v > 100) v = 100;
            id(g_calendar_opa_pct) = v;
            if (id(g_lvgl_ready)) {
              uint32_t opa = (uint32_t)((v * 255) / 100);
              lv_obj_set_style_opa(id(calendar_panel),     opa, 0);
              lv_obj_set_style_opa(id(clock_pill_obj),     opa, 0);
              lv_obj_set_style_opa(id(slideshow_clock),    opa, 0);
              lv_obj_set_style_opa(id(slideshow_date_lbl), opa, 0);
              lv_obj_set_style_opa(id(weather_widget),     opa, 0);
            }
            char b[12];
            snprintf(b, sizeof(b), "%d %%", v);
            lv_label_set_text(id(settings_calopa_val), b);

  # Calendar events pushed from HA automation into input_text.panel_calendar_events
  - platform: homeassistant
    id: ha_calendar_events
    entity_id: input_text.panel_calendar_events
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_obj_t* labels[8] = {
              id(cal_evt_0), id(cal_evt_1), id(cal_evt_2), id(cal_evt_3),
              id(cal_evt_4), id(cal_evt_5), id(cal_evt_6), id(cal_evt_7)
            };
            lv_obj_t* row_objs[8] = {
              id(cal_row_0), id(cal_row_1), id(cal_row_2), id(cal_row_3),
              id(cal_row_4), id(cal_row_5), id(cal_row_6), id(cal_row_7)
            };
            std::string text = x.empty() ? "No events this week" : x;
            // Show first row with "No events" if empty, else fill rows per event
            bool no_events = x.empty();
            for (int i = 0; i < 8; i++) {
              std::string line = "";
              if (!text.empty()) {
                auto nl = text.find('\n');
                line = (nl != std::string::npos) ? text.substr(0, nl) : text;
                text = (nl != std::string::npos) ? text.substr(nl + 1) : "";
              }
              lv_label_set_text(labels[i], line.c_str());
              if (!line.empty()) {
                lv_obj_clear_flag(row_objs[i], LV_OBJ_FLAG_HIDDEN);
              } else {
                lv_obj_add_flag(row_objs[i], LV_OBJ_FLAG_HIDDEN);
              }
            }

  # ─── Room dashboard: light state + brightness + temp/humidity ─────────
  # Each room card subscribes to light state ("on"/"off"), updates the bulb
  # tint and ON/OFF label. Dimmable rooms (2-5) also subscribe to brightness
  # and drive the arc. Temp/humidity update text labels.
  - platform: homeassistant
    id: room1_state
    entity_id: "${room1_light}"
    internal: true
    on_value:
      then:
        - lambda: |-
            bool on = (x == "on");
            lv_label_set_text(id(room1_state_lbl), on ? "ON" : "OFF");
            lv_obj_set_style_text_color(id(room1_state_lbl), on ? lv_color_hex(0xFFD700) : lv_color_hex(0x666666), 0);
            lv_obj_set_style_img_recolor(id(room1_icon), on ? lv_color_hex(0xFFD700) : lv_color_hex(0x555555), 0);
            lv_obj_set_style_img_recolor_opa(id(room1_icon), LV_OPA_COVER, 0);
            // Maintain the all-lights bitmask + refresh the master button label.
            if (on) id(g_lights_on_mask) |= (1 << 0);
            else    id(g_lights_on_mask) &= ~(1 << 0);
            bool any = id(g_lights_on_mask) != 0;
            lv_label_set_text(id(all_lights_lbl), any ? "All Lights Off" : "All Lights On");
            lv_obj_set_style_text_color(id(all_lights_lbl), any ? lv_color_hex(0xFFAACC) : lv_color_hex(0xFFD700), 0);
  - platform: homeassistant
    id: room1_temp_s
    entity_id: "${room1_temp}"
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(room1_temp_lbl), (x + "\xC2\xB0").c_str());
  - platform: homeassistant
    id: room1_hum_s
    entity_id: "${room1_humidity}"
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(room1_hum_lbl), (x + "%").c_str());

  - platform: homeassistant
