      then:
        - lambda: |-
            bool on = (x == "on");
            lv_label_set_text(id(pres1_lbl), on ? "ACTIVE" : "CLEAR");
            lv_obj_set_style_text_color(id(pres1_lbl), on ? lv_color_hex(0x10D080) : lv_color_hex(0x666666), 0);
