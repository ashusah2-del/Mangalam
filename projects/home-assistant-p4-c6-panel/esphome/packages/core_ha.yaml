  # ─── Tado page: per-zone state, current temp/humidity, target temp ───
  # State (off/auto/heat) drives the mode buttons' highlight. Target temp
  # updates a global the +/− buttons mutate; current temp/humidity drive
  # the big readout. Each card has 4 HA subscriptions = 24 total.
  - platform: homeassistant
    id: tado1_state
    entity_id: "${tado1_entity}"
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string m = x;
            const char* lbl = (m == "off") ? "OFF" : (m == "heat") ? "HEAT" : "AUTO";
            lv_label_set_text(id(tado1_mode_lbl), lbl);
            uint32_t c = (m == "off") ? 0x666666 : (m == "heat") ? 0xFF8844 : 0x66AAFF;
            lv_obj_set_style_text_color(id(tado1_mode_lbl), lv_color_hex(c), 0);
  - platform: homeassistant
    id: tado1_ct
    entity_id: "${tado1_entity}"
    attribute: current_temperature
    internal: true
    on_value:
      then:
        - lambda: |-
            char b[10]; snprintf(b, sizeof(b), "%s\xC2\xB0", x.c_str());
            lv_label_set_text(id(tado1_ct_lbl), b);
  - platform: homeassistant
    id: tado1_ch
    entity_id: "${tado1_entity}"
    attribute: current_humidity
    internal: true
