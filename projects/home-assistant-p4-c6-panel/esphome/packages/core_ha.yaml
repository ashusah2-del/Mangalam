  - platform: homeassistant
    id: room2_brightness
    entity_id: "${room2_light}"
    attribute: brightness
    internal: true
    on_value:
      then:
        - lambda: |-
            int b = atoi(x.c_str());
            int pct = (b * 100) / 255;
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            lv_slider_set_value(id(room2_arc), pct, LV_ANIM_OFF);
  - platform: homeassistant
