  # ─── Presence page: 6 binary sensors ──────────────────────────────────
  # State "on" → green dot + ACTIVE; "off"/anything else → grey + CLEAR.
  - platform: homeassistant
    id: pres1_state
    entity_id: "${pres1_entity}"
