logger:
  level: DEBUG

json:

http_request:
  timeout: 10s
  follow_redirects: true
  useragent: GuitionP4ImmichPanel/1.0

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 400kHz
  id: bus_a

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - voice_assistant.start_continuous:
  on_client_disconnected:
    - voice_assistant.stop:

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Panel IP Address"
    ssid:
      name: "Panel Wi-Fi SSID"
  - platform: homeassistant
    id: ha_immich_url
    entity_id: input_text.panel_immich_url
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!x.empty()) {
              id(immich_base_url_runtime) = x.c_str();
            }
        - script.execute: refresh_immich_slideshow

sensor:
  - platform: uptime
    name: "Panel Uptime"
  - platform: wifi_signal
    name: "Panel Wi-Fi RSSI"
    id: panel_wifi_rssi
    update_interval: 30s

binary_sensor:
  - platform: status
    name: "Panel Online"
