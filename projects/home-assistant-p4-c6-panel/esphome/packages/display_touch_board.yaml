                  x: 200
                  y: 382
                  width: 56
                  height: 44
                  radius: 22
                  bg_color: 0x2E4A8E
                  border_width: 0
                  text: "+"
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  on_click:
                    - lambda: |-
                        int v = id(g_calendar_opa_pct) + 5;
                        if (v > 100) v = 100;
                        id(g_calendar_opa_pct) = v;
                        if (id(g_lvgl_ready)) {
                          uint32_t opa = (uint32_t)((v * 255) / 100);
                          lv_obj_set_style_opa(id(calendar_panel),     opa, 0);
                          lv_obj_set_style_opa(id(clock_pill_obj),     opa, 0);
                          lv_obj_set_style_opa(id(slideshow_clock),    opa, 0);
                          lv_obj_set_style_opa(id(slideshow_date_lbl), opa, 0);
                          lv_obj_set_style_opa(id(weather_widget),     opa, 0);
                        }
                        char b[12];
                        snprintf(b, sizeof(b), "%d %%", v);
                        lv_label_set_text(id(settings_calopa_val), b);
                    - homeassistant.service:
                        service: input_number.set_value
                        data:
                          entity_id: input_number.panel_calendar_opacity
                          value: !lambda 'return id(g_calendar_opa_pct);'

