                              data: { entity_id: "${room5_light}" }
                          - homeassistant.service:
                              service: switch.turn_off
                              data: { entity_id: "${room1_light}" }
                          - homeassistant.service:
                              service: switch.turn_off
                              data: { entity_id: "${room6_light}" }
                        else:
                          - homeassistant.service:
                              service: light.turn_on
                              data: { entity_id: "${room2_light}" }
                          - homeassistant.service:
                              service: light.turn_on
                              data: { entity_id: "${room3_light}" }
                          - homeassistant.service:
                              service: light.turn_on
                              data: { entity_id: "${room4_light}" }
                          - homeassistant.service:
                              service: light.turn_on
                              data: { entity_id: "${room5_light}" }
                          - homeassistant.service:
                              service: switch.turn_on
