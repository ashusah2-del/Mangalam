            border_width: 2
            radius: 14
            on_click:
              - homeassistant.service:
                  service: homeassistant.toggle
                  data:
                    entity_id: "${tile1_entity}"
            widgets:
              - label:
                  align: TOP_MID
                  y: 22
                  text: "${tile1_label}"
                  text_font: montserrat_22
                  text_color: 0xFFFFFF
              - label:
                  id: tile1_state_lbl
                  align: BOTTOM_MID
                  y: -22
                  text: "---"
                  text_font: montserrat_18
