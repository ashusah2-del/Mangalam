image:
  - file: mdi:image-outline
    id: img_no_photo
    type: grayscale
    resize: 128x128
    transparency: alpha_channel
  - file: mdi:home-off
    id: img_ha_offline
    type: grayscale
    resize: 128x128
    transparency: alpha_channel
  # Room-card icon — single 48x48 light bulb, recoloured at runtime via
  # lv_obj_set_style_img_recolor depending on the light state (gold = on,
  # grey = off). Single source so the binary doesn't carry both variants.
  - file: mdi:lightbulb
    id: img_lightbulb
    type: grayscale
    resize: 48x48
    transparency: alpha_channel
  # Presence indicator — recoloured per state (green=ACTIVE, grey=CLEAR).
  # House icon makes it obvious which sensors track motion in the house.
  - file: mdi:home
    id: img_dot
    type: grayscale
    resize: 80x80
    transparency: alpha_channel
  # Weather widget icons — one per HA `weather` state. All start hidden;
  # the on_value lambda below reveals the matching one and hides the rest.
  - file: mdi:weather-sunny
    id: img_wx_sunny
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-night
    id: img_wx_night
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-cloudy
    id: img_wx_cloudy
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-partly-cloudy
    id: img_wx_partlycloudy
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-rainy
    id: img_wx_rainy
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-snowy
    id: img_wx_snowy
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-fog
    id: img_wx_fog
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-lightning
    id: img_wx_lightning
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  - file: mdi:weather-windy
    id: img_wx_windy
    type: grayscale
    resize: 96x96
    transparency: alpha_channel
  # Stock fallback images — downloaded once at build time, stored in flash.
  # Shown when Immich is unavailable; cycles on each slideshow tick.
  # 1024x600 = full screen (overlaps calendar; calendar panel has bg_opa: 70%
  # so the image still shows through behind the calendar text).
  # No LVGL zoom — zoom on flash-based static images crashes the ESP32-P4
  # under PSRAM XIP, so the source size IS the displayed size.
  # 2 images at 1.23MB each = 2.46MB total embedded, well within OTA budget.
  - file: https://picsum.photos/id/10/1024/600
    id: stock_img_0
    type: RGB565
    resize: 1024x600
  - file: https://picsum.photos/id/28/1024/600
    id: stock_img_1
    type: RGB565
    resize: 1024x600

globals:
  - id: immich_base_url
    type: std::string
    restore_value: no
    initial_value: '"${proxy_url}"'
  - id: g_immich_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ha_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  # Tracks active API clients so refresh+VA actions only run on first-connect /
  # last-disconnect rather than on every client transition.
  - id: g_ha_client_count
    type: int
    restore_value: no
    initial_value: '0'
  # true = currently displaying an embedded stock image, not Immich
  - id: g_using_fallback
    type: bool
    restore_value: no
    initial_value: 'false'
  # Retry counter for Immich download errors (reset on success, max 3 attempts)
  - id: g_immich_retry
    type: int
    restore_value: no
    initial_value: '0'
  # Cycles through embedded stock images (0–3)
  - id: g_stock_idx
    type: int
    restore_value: no
    initial_value: '0'
  # Tado page — current target temperature per zone (updated from HA's
  # climate.X "temperature" attribute). The +/− buttons mutate these and
  # call climate.set_temperature with the new value.
  - { id: g_tado1_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado2_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado3_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado4_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado5_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado6_target, type: float, restore_value: no, initial_value: '20.0' }
  # True while the camera_view_page is foregrounded. The 3-second
  # camera-refresh interval only fires when this is set, so we don't poll
  # HA constantly when no one's looking.
  - { id: g_on_camera_view, type: bool, restore_value: no, initial_value: 'false' }
  # Bitmask of which dashboard lights are currently on. Bit i is for room i+1
  # (so bit 0 = Drawing, bit 1 = Office, …, bit 5 = Conservatory). The
  # all-lights toggle button uses this to decide whether tapping should
  # turn everything off or turn everything on.
  - { id: g_lights_on_mask, type: uint8_t, restore_value: no, initial_value: '0' }
  # Slideshow refresh interval in minutes. Sourced from HA's
  # input_number.panel_slideshow_interval helper; the 1-minute interval
  # bumps the counter and fires the refresh script when it crosses the
  # threshold. restore_value: yes so a non-default tuning survives reboot.
  - { id: g_slideshow_interval_min, type: int, restore_value: yes, initial_value: '10' }
  - { id: g_slideshow_counter_min,  type: int, restore_value: no,  initial_value: '0' }
  # Calendar overlay opacity, 0–100 %. Mirrors HA's
  # input_number.panel_calendar_opacity and is editable on the settings
  # page. restore_value: yes so a tuning sticks across reboots.
  - { id: g_calendar_opa_pct, type: int, restore_value: yes, initial_value: '70' }
  # True once the on_boot lambda has run — every multi-widget opacity cascade,
  # the weather-state lambda, and the weather attribute label-update lambdas
  # gate themselves on this so a HA push that arrives at boot before LVGL is
  # fully constructed can't trigger an Instruction-address-misaligned crash.
  # Flipped to true in the on_boot lambda after a 2-second delay.
  - { id: g_lvgl_ready, type: bool, restore_value: no, initial_value: 'false' }

# Shared online_image component used for both Immich photos and stock fallback images.
# URL points to the local baseline-JPEG proxy (re-encodes Immich previews as guaranteed SOF0).
online_image:
  # Eufy camera thumbnails — small (300x180) JPEGs from the proxy's /camera
  # endpoint, refreshed every 60 seconds on the camera grid page.
  - id: cam1_thumb
    url: "${proxy_url}/camera/${cam1_entity}?size=thumb"
    format: JPEG
    type: RGB565
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // LVGL 9: refresh the widget's src descriptor after each download
          // so the new frame actually paints (the compile-time src: binding
          // points at an empty buffer at boot and never re-resolves).
          lv_image_set_src(id(cam1_widget), id(cam1_thumb).get_lv_image_dsc());
          lv_obj_invalidate(id(cam1_widget));
  - id: cam2_thumb
    url: "${proxy_url}/camera/${cam2_entity}?size=thumb"
    format: JPEG
    type: RGB565
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // LVGL 9: refresh the widget's src descriptor after each download
          // so the new frame actually paints (the compile-time src: binding
          // points at an empty buffer at boot and never re-resolves).
          lv_image_set_src(id(cam2_widget), id(cam2_thumb).get_lv_image_dsc());
          lv_obj_invalidate(id(cam2_widget));
  - id: cam3_thumb
    url: "${proxy_url}/camera/${cam3_entity}?size=thumb"
    format: JPEG
    type: RGB565
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // LVGL 9: refresh the widget's src descriptor after each download
          // so the new frame actually paints (the compile-time src: binding
          // points at an empty buffer at boot and never re-resolves).
          lv_image_set_src(id(cam3_widget), id(cam3_thumb).get_lv_image_dsc());
          lv_obj_invalidate(id(cam3_widget));
  - id: cam4_thumb
    url: "${proxy_url}/camera/${cam4_entity}?size=thumb"
    format: JPEG
    type: RGB565
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // LVGL 9: refresh the widget's src descriptor after each download
          // so the new frame actually paints (the compile-time src: binding
          // points at an empty buffer at boot and never re-resolves).
          lv_image_set_src(id(cam4_widget), id(cam4_thumb).get_lv_image_dsc());
          lv_obj_invalidate(id(cam4_widget));
  # Live view — single component, URL is swapped per camera on tap. The
  # update is triggered manually on page show (and via a 3s interval that
  # only fires while the camera_view_page is active, guarded by g_on_camera_view).
  - id: camera_live_img
    url: "${proxy_url}/camera/${cam1_entity}?size=full"
    format: JPEG
    type: RGB565
    resize: 600x340
    buffer_size: 65536
    update_interval: never
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          lv_image_set_src(id(camera_live_widget), id(camera_live_img).get_lv_image_dsc());
          lv_obj_invalidate(id(camera_live_widget));

  - id: immich_photo
    url: "${proxy_url}/random-photo"
    format: JPEG
    type: RGB565
    # Proxy already shapes images to fit within 1024×600 at the panel's
    # height (600 px). Just allow that footprint here so the decode buffer
    # is large enough to hold the panel-height result without re-scaling.
    resize: 1024x600
    buffer_size: 65536
    update_interval: never
    request_headers:
      Accept: image/jpeg
    on_download_finished:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      - globals.set:
          id: g_immich_ok
          value: 'true'
      - globals.set:
          id: g_immich_retry
          value: '0'
      # Scale and centre image in the right 684×600 area (x=340 to x=1023).
      # LVGL 9 API: lv_image_set_scale (replaces lv_img_set_zoom). 256 = 1:1.
      # inner_align CENTER auto-centres the image inside the widget bounding box,
      # so we don't have to translate the widget per-image.
      - lambda: |-
          auto dsc = id(immich_photo).get_lv_image_dsc();
          // LVGL 9 binding fix: rebind the widget src so the freshly decoded
          // descriptor is what gets painted. The compile-time src: binding
          // points at an empty buffer at boot and never re-resolves.
          lv_image_set_src(id(slideshow_img), dsc);
          lv_image_set_src(id(dash_bg_img), dsc);
          if (dsc != nullptr && dsc->header.w > 0 && dsc->header.h > 0) {
            // Widget auto-sizes to the actual decoded buffer. Centre the
            // image horizontally across the full 1024-px panel — the
            // calendar panel sits on top of the left 340 px at 70 % opacity
            // so the photo shows through behind it.
            int dw = (int)dsc->header.w;
            int dh = (int)dsc->header.h;
            int x = (1024 - dw) / 2;
            int y = (600  - dh) / 2;
            lv_obj_set_pos(id(slideshow_img), x, y);
          }
          lv_obj_invalidate(id(slideshow_img));
          lv_obj_invalidate(id(dash_bg_img));
      - lvgl.widget.show: slideshow_img
      - lvgl.widget.hide: stock_fallback_img
      - lvgl.widget.hide: slideshow_placeholder_obj
      - lvgl.widget.hide: error_bar
      - lvgl.label.update:
          id: dash_error_lbl
          text: ""
    on_error:
      - globals.set:
          id: g_immich_ok
          value: 'false'
      # Retry with a different random asset up to 3 times before giving up.
      # Handles JPEG format incompatibilities (e.g. extended-sequential SOF1) in ~40% of assets.
      - if:
          condition:
            lambda: return !id(g_using_fallback) && id(g_immich_retry) < 3;
          then:
            - globals.set:
                id: g_immich_retry
                value: !lambda return id(g_immich_retry) + 1;
            - script.execute: refresh_immich_slideshow
          else:
            - globals.set:
                id: g_immich_retry
                value: '0'
            - lvgl.widget.show: error_bar
            - lvgl.label.update:
                id: error_lbl
                text: "Immich unavailable - showing stock image"
            - lvgl.label.update:
                id: dash_error_lbl
                text: "Immich offline"
            - script.execute: try_fallback_image

script:
  # Fetches a random baseline JPEG from the local proxy and displays it.
  # The proxy (immich-proxy.service on the Docker host) handles Immich API calls
  # and re-encodes all images as guaranteed SOF0 baseline JPEG before serving.
  - id: refresh_immich_slideshow
    mode: restart
    then:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      - lvgl.widget.hide: slideshow_img
      - online_image.set_url:
          id: immich_photo
          url: "${proxy_url}/random-photo"
          update: true

  # Shows the next embedded stock image (cycles through 2 pre-downloaded images).
  # No internet required — images are stored in device flash at build time.
  - id: try_fallback_image
    mode: single
    then:
      - globals.set:
          id: g_using_fallback
          value: 'true'
      - lambda: |-
          id(g_stock_idx) = (id(g_stock_idx) + 1) % 2;
          lv_obj_t* stock_imgs[2] = {
            id(stock_fallback_img_0), id(stock_fallback_img_1),
          };
          for (int i = 0; i < 2; i++) {
            if (i == id(g_stock_idx))
              lv_obj_clear_flag(stock_imgs[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(stock_imgs[i], LV_OBJ_FLAG_HIDDEN);
          }
          lv_obj_clear_flag(id(stock_fallback_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_placeholder_obj), LV_OBJ_FLAG_HIDDEN);

interval:
  # Slideshow refresh — fires every minute, only executes the refresh
  # script once the per-minute counter reaches the configured interval
  # (g_slideshow_interval_min). The interval is sourced from HA's
  # input_number.panel_slideshow_interval helper so it's runtime-tunable.
  - interval: 1min
    then:
      - lambda: |-
          id(g_slideshow_counter_min)++;
          if (id(g_slideshow_counter_min) >= id(g_slideshow_interval_min)) {
            id(g_slideshow_counter_min) = 0;
            id(refresh_immich_slideshow).execute();
          }

  # (Removed) Live-view auto-refresh — the 3-second interval kept
  # g_on_camera_view stuck true after the page closed and hammered the
  # panel with 800×500 JPEG decodes, eventually crashing it with
  # "Instruction address misaligned". Live view now refreshes only when
  # the user taps a camera tile.

  - interval: 1s
    then:
      - lvgl.label.update:
          id: slideshow_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: slideshow_date_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            // ESPTime::day_of_week is 1..7 (Sunday=1) — must subtract 1 to index a
            // 0-based 7-element array. wd[7] is out-of-bounds → crash on Saturdays.
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[20];
            snprintf(b, sizeof(b), "%s %02d %s", wd[wi], t.day_of_month, mo[mi]);
            return std::string(b);
      - lvgl.label.update:
          id: cal_today_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[wi], t.day_of_month, mo[mi], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: dash_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[wi], t.day_of_month, mo[mi], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_rssi
          text: !lambda |-
            char b[12];
            snprintf(b, sizeof(b), "%.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_ha_lbl
          text: !lambda |-
            return id(g_ha_connected) ? std::string("Home Assistant: Connected") : std::string("Home Assistant: Disconnected");
      - lvgl.label.update:
          id: settings_immich_lbl
          text: !lambda |-
            return id(g_immich_ok) ? std::string("Immich: Online") : std::string("Immich: Offline");
      - lvgl.label.update:
          id: settings_ip_lbl
          text: !lambda |-
            auto ip = id(wifi_ip_addr).state;
            return std::string("Device IP: ") + (ip.empty() ? "--" : ip);
      - lvgl.label.update:
          id: settings_rssi_lbl
          text: !lambda |-
            char b[24];
            snprintf(b, sizeof(b), "Signal: %.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_immich_url_val
          text: !lambda |-
            return id(immich_base_url).empty() ? std::string("--") : id(immich_base_url);

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    hsync_pulse_width: 20
    rotation: "${rotate_display}"

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    i2c_id: bus_a
    interrupt_pin: GPIO21
    reset_pin: GPIO22
    on_touch:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: OFF

binary_sensor:
  - platform: template
    name: "Panel Touch Input"
    id: panel_touch_input

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23
    frequency: 100Hz
    min_power: 0.0
    max_power: 0.8

light:
  - platform: monochromatic
    id: panel_backlight
    name: "Panel Backlight"
    icon: mdi:television
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  byte_order: little_endian
  bg_color: 0x000000
  on_idle:
    timeout: "${idle_timeout}"
    then:
      - lvgl.page.show: slideshow_page

  pages:
    # ═══════════════════════════════════════════════════════════
    # PAGE 1 — SLIDESHOW  (idle / lock screen)
    # Layout: full 1024x600
    #   Left  0-339px  : calendar panel (70% opaque dark bg)
    #   Right 340-1023px: Immich photo, clock pill (top-right)
    # ═══════════════════════════════════════════════════════════
    - id: slideshow_page
      bg_color: 0x000000
      widgets:
        # ── Background image (Immich or stock) ─────────────────
        # No explicit width/height — the widget auto-sizes to the actual
        # decoded image buffer. With explicit dimensions LVGL reads with
        # the WIDGET's stride (684×2 bytes/row) instead of the BUFFER's
        # (512×2 bytes/row), producing vertical-stripe corruption.
        # Position is updated to the slideshow area in the lambda below.
        - image:
            id: slideshow_img
            src: immich_photo
            x: 340
            y: 0
            hidden: true

        # ── Stock fallback images — container + 2 full-screen children ──
        # Container toggled by on_download_finished/on_error; inner images cycled via try_fallback_image.
        # Images are 1024x600 (full screen). Calendar panel sits on top with
        # bg_opa: 70% so the image shows through behind the text.
        - obj:
            id: stock_fallback_img
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            hidden: true
            widgets:
              - image:
                  id: stock_fallback_img_0
                  src: stock_img_0
                  align: TOP_LEFT
                  x: 0
                  y: 0
              - image:
                  id: stock_fallback_img_1
                  src: stock_img_1
                  align: TOP_LEFT
                  x: 0
                  y: 0
                  hidden: true

        # ── Static placeholder (shown when all image sources fail) ──
        - obj:
            id: slideshow_placeholder_obj
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x0D0D2B
            border_width: 0
            pad_all: 0
            widgets:
              - image:
                  src: img_no_photo
                  align: CENTER
                  y: -30
              - label:
                  align: CENTER
                  y: 72
                  text: "Photos Unavailable"
                  text_font: montserrat_24
                  text_color: 0x444466
              - label:
                  align: CENTER
                  y: 108
                  text: "Check Immich connection"
                  text_font: montserrat_18
                  text_color: 0x333355

        # ── Weather widget (top-right, transparent) ────────────
        # Stack of 9 mdi:weather-* icons at the same coordinates; the
        # weather_state on_value lambda reveals exactly one at a time and
        # recolours it by condition. Temperature + condition labels live
        # alongside. Background is fully transparent so the slideshow
        # photo shows through.
        - obj:
            id: weather_widget
            x: 800
            y: 130
            width: 210
            height: 224
            align: TOP_LEFT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              # Location label at the very top of the widget.
