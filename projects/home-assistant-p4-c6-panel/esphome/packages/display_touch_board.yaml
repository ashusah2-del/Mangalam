              - label: { align: LEFT_MID, x: 20, text: "Cameras", text_font: montserrat_24, text_color: 0xFFFFFF }
              - label: { align: CENTER, text: "Tap a tile to view", text_font: montserrat_18, text_color: 0xAAAAAA }
