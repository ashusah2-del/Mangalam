image:
  - file: mdi:image-outline
    id: img_no_photo
    type: grayscale
    resize: 128x128
    transparency: alpha_channel
  - file: mdi:home-off
    id: img_ha_offline
    type: grayscale
    resize: 128x128
    transparency: alpha_channel
  # Stock fallback images — downloaded once at build time, stored in flash.
  # Shown when Immich is unavailable; cycles on each slideshow tick.
  # 1024x600 = full screen (overlaps calendar; calendar panel has bg_opa: 70%
  # so the image still shows through behind the calendar text).
  # No LVGL zoom — zoom on flash-based static images crashes the ESP32-P4
  # under PSRAM XIP, so the source size IS the displayed size.
  # 2 images at 1.23MB each = 2.46MB total embedded, well within OTA budget.
  - file: https://picsum.photos/id/10/1024/600
    id: stock_img_0
    type: RGB565
    resize: 1024x600
  - file: https://picsum.photos/id/28/1024/600
    id: stock_img_1
    type: RGB565
    resize: 1024x600

globals:
  - id: immich_base_url
    type: std::string
    restore_value: no
    initial_value: '"${proxy_url}"'
  - id: g_immich_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ha_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  # Tracks active API clients so refresh+VA actions only run on first-connect /
  # last-disconnect rather than on every client transition.
  - id: g_ha_client_count
    type: int
    restore_value: no
    initial_value: '0'
  # true = currently displaying an embedded stock image, not Immich
  - id: g_using_fallback
    type: bool
    restore_value: no
    initial_value: 'false'
  # Retry counter for Immich download errors (reset on success, max 3 attempts)
  - id: g_immich_retry
    type: int
    restore_value: no
    initial_value: '0'
  # Cycles through embedded stock images (0–3)
  - id: g_stock_idx
    type: int
    restore_value: no
    initial_value: '0'

# Shared online_image component used for both Immich photos and stock fallback images.
# URL points to the local baseline-JPEG proxy (re-encodes Immich previews as guaranteed SOF0).
online_image:
  - id: immich_photo
    url: "${proxy_url}/random-photo"
    format: JPEG
    type: RGB565
    resize: 512x400
    buffer_size: 65536
    update_interval: never
    request_headers:
      Accept: image/jpeg
    on_download_finished:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      - globals.set:
          id: g_immich_ok
          value: 'true'
      - globals.set:
          id: g_immich_retry
          value: '0'
      # Scale and centre image in the right 684×600 area (x=340 to x=1023).
      # Also clamp widget size to the rendered image so its bounding box
      # never bleeds into the calendar panel area on the left.
      - lambda: |-
          auto dsc = id(immich_photo).get_lv_image_dsc();
          lv_img_set_pivot(id(slideshow_img), 0, 0);
          if (dsc != nullptr && dsc->header.w > 0 && dsc->header.h > 0) {
            const int avail_w = 684;
            const int avail_h = 600;
            float scale_x = (float)avail_w / (float)dsc->header.w;
            float scale_y = (float)avail_h / (float)dsc->header.h;
            float scale = (scale_x < scale_y) ? scale_x : scale_y;
            uint16_t zoom = (uint16_t)(256.0f * scale);
            if (zoom < 1) zoom = 1;
            int disp_w = (int)((float)dsc->header.w * zoom / 256.0f);
            int disp_h = (int)((float)dsc->header.h * zoom / 256.0f);
            if (disp_w < 1) disp_w = 1;
            if (disp_h < 1) disp_h = 1;
            int x = 340 + (avail_w - disp_w) / 2;
            int y = (avail_h - disp_h) / 2;
            lv_img_set_zoom(id(slideshow_img), zoom);
            lv_obj_set_size(id(slideshow_img), disp_w, disp_h);
            lv_obj_set_pos(id(slideshow_img), x, y);
          } else {
            lv_img_set_zoom(id(slideshow_img), 256);
            lv_obj_set_size(id(slideshow_img), 684, 600);
            lv_obj_set_pos(id(slideshow_img), 340, 0);
          }
      - lvgl.widget.show: slideshow_img
      - lvgl.widget.hide: stock_fallback_img
      - lvgl.widget.hide: slideshow_placeholder_obj
      - lvgl.widget.hide: error_bar
      - lvgl.label.update:
          id: dash_error_lbl
          text: ""
    on_error:
      - globals.set:
          id: g_immich_ok
          value: 'false'
      # Retry with a different random asset up to 3 times before giving up.
      # Handles JPEG format incompatibilities (e.g. extended-sequential SOF1) in ~40% of assets.
      - if:
          condition:
            lambda: return !id(g_using_fallback) && id(g_immich_retry) < 3;
          then:
            - globals.set:
                id: g_immich_retry
                value: !lambda return id(g_immich_retry) + 1;
            - script.execute: refresh_immich_slideshow
          else:
            - globals.set:
                id: g_immich_retry
                value: '0'
            - lvgl.widget.show: error_bar
            - lvgl.label.update:
                id: error_lbl
                text: "Immich unavailable - showing stock image"
            - lvgl.label.update:
                id: dash_error_lbl
                text: "Immich offline"
            - script.execute: try_fallback_image

script:
  # Fetches a random baseline JPEG from the local proxy and displays it.
  # The proxy (immich-proxy.service on the Docker host) handles Immich API calls
  # and re-encodes all images as guaranteed SOF0 baseline JPEG before serving.
  - id: refresh_immich_slideshow
    mode: restart
    then:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      - lvgl.widget.hide: slideshow_img
      - online_image.set_url:
          id: immich_photo
          url: "${proxy_url}/random-photo"
          update: true

  # Shows the next embedded stock image (cycles through 2 pre-downloaded images).
  # No internet required — images are stored in device flash at build time.
  - id: try_fallback_image
    mode: single
    then:
      - globals.set:
          id: g_using_fallback
          value: 'true'
      - lambda: |-
          id(g_stock_idx) = (id(g_stock_idx) + 1) % 2;
          lv_obj_t* stock_imgs[2] = {
            id(stock_fallback_img_0), id(stock_fallback_img_1),
          };
          for (int i = 0; i < 2; i++) {
            if (i == id(g_stock_idx))
              lv_obj_clear_flag(stock_imgs[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(stock_imgs[i], LV_OBJ_FLAG_HIDDEN);
          }
          lv_obj_clear_flag(id(stock_fallback_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_placeholder_obj), LV_OBJ_FLAG_HIDDEN);

interval:
  - interval: "${immich_slideshow_interval}"
    then:
      - script.execute: refresh_immich_slideshow

  - interval: 1s
    then:
      - lvgl.label.update:
          id: slideshow_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: slideshow_date_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            // ESPTime::day_of_week is 1..7 (Sunday=1) — must subtract 1 to index a
            // 0-based 7-element array. wd[7] is out-of-bounds → crash on Saturdays.
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[20];
            snprintf(b, sizeof(b), "%s %02d %s", wd[wi], t.day_of_month, mo[mi]);
            return std::string(b);
      - lvgl.label.update:
          id: cal_today_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[wi], t.day_of_month, mo[mi], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: dash_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[wi], t.day_of_month, mo[mi], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_rssi
          text: !lambda |-
            char b[12];
            snprintf(b, sizeof(b), "%.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_ha_lbl
          text: !lambda |-
            return id(g_ha_connected) ? std::string("Home Assistant: Connected") : std::string("Home Assistant: Disconnected");
      - lvgl.label.update:
          id: settings_immich_lbl
          text: !lambda |-
            return id(g_immich_ok) ? std::string("Immich: Online") : std::string("Immich: Offline");
      - lvgl.label.update:
          id: settings_ip_lbl
          text: !lambda |-
            auto ip = id(wifi_ip_addr).state;
            return std::string("Device IP: ") + (ip.empty() ? "--" : ip);
      - lvgl.label.update:
          id: settings_rssi_lbl
          text: !lambda |-
            char b[24];
            snprintf(b, sizeof(b), "Signal: %.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_immich_url_val
          text: !lambda |-
            return id(immich_base_url).empty() ? std::string("--") : id(immich_base_url);

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    hsync_pulse_width: 20
    rotation: "${rotate_display}"

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    i2c_id: bus_a
    interrupt_pin: GPIO21
    reset_pin: GPIO22
    on_touch:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: OFF

binary_sensor:
  - platform: template
    name: "Panel Touch Input"
    id: panel_touch_input

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23
    frequency: 100Hz
    min_power: 0.0
    max_power: 0.8

light:
  - platform: monochromatic
    id: panel_backlight
    name: "Panel Backlight"
    icon: mdi:television
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  byte_order: little_endian
  bg_color: 0x000000
  on_idle:
    timeout: "${idle_timeout}"
    then:
      - lvgl.page.show: slideshow_page

  pages:
    # ═══════════════════════════════════════════════════════════
    # PAGE 1 — SLIDESHOW  (idle / lock screen)
    # Layout: full 1024x600
    #   Left  0-339px  : calendar panel (70% opaque dark bg)
    #   Right 340-1023px: Immich photo, clock pill (top-right)
    # ═══════════════════════════════════════════════════════════
    - id: slideshow_page
      bg_color: 0x000000
      widgets:
        # ── Background image (Immich or stock) ─────────────────
        # Sized 684x600 = slideshow area; positioned at x=340 so it never
        # overlaps the calendar panel. Inner image scaled to fit by the
        # on_download_finished lambda; widget size also updated there.
        - image:
            id: slideshow_img
            src: immich_photo
            x: 340
            y: 0
            width: 684
            height: 600
            hidden: true

        # ── Stock fallback images — container + 2 full-screen children ──
        # Container toggled by on_download_finished/on_error; inner images cycled via try_fallback_image.
        # Images are 1024x600 (full screen). Calendar panel sits on top with
        # bg_opa: 70% so the image shows through behind the text.
        - obj:
            id: stock_fallback_img
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            hidden: true
            widgets:
              - image:
                  id: stock_fallback_img_0
                  src: stock_img_0
                  align: TOP_LEFT
                  x: 0
                  y: 0
              - image:
                  id: stock_fallback_img_1
                  src: stock_img_1
                  align: TOP_LEFT
                  x: 0
                  y: 0
                  hidden: true

        # ── Static placeholder (shown when all image sources fail) ──
        - obj:
            id: slideshow_placeholder_obj
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x0D0D2B
            border_width: 0
            pad_all: 0
            widgets:
              - image:
                  src: img_no_photo
                  align: CENTER
                  y: -30
              - label:
                  align: CENTER
                  y: 72
                  text: "Photos Unavailable"
                  text_font: montserrat_24
                  text_color: 0x444466
              - label:
                  align: CENTER
                  y: 108
                  text: "Check Immich connection"
                  text_font: montserrat_18
                  text_color: 0x333355

        # ── Calendar panel (left side, 70% opaque) ─────────────
        - obj:
            id: calendar_panel
            x: 0
            y: 0
            width: 340
            height: 600
            align: TOP_LEFT
            bg_color: 0x050510
            bg_opa: 70%
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              # Title row
              - label:
                  x: 14
                  y: 10
                  text: "CALENDAR"
                  text_font: montserrat_20
                  text_color: 0x69F0AE
              # Today's date (updated every second)
              - label:
                  id: cal_today_lbl
                  x: 14
                  y: 34
                  text: "---"
                  text_font: montserrat_16
                  text_color: 0xAABBCC
              # Header divider
              - obj:
                  x: 0
                  y: 60
                  width: 340
                  height: 2
                  bg_color: 0x1E3A6E
                  border_width: 0
                  radius: 0
              # ── Event rows (8 slots, 66px each, alternating ribbon colour) ──
              # Row 0 visible from boot with "No events this week"; on_value lambda
              # overwrites it when HA publishes the panel_calendar_events entity.
              - obj:
                  id: cal_row_0
                  x: 0
                  y: 64
                  width: 340
                  height: 66
                  bg_color: 0x0D1F3A
                  bg_opa: 55%
                  border_width: 0
                  radius: 0
                  widgets:
                    - label:
                        id: cal_evt_0
                        x: 12
                        y: 4
                        width: 316
                        text: "No events this week"
                        text_font: montserrat_16
                        text_color: 0xEEEEEE
                        long_mode: WRAP
              - obj:
                  id: cal_row_1
                  x: 0
                  y: 130
                  width: 340
                  height: 66
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
                        id: cal_evt_1
                        x: 12
                        y: 4
                        width: 316
                        text: ""
                        text_font: montserrat_16
                        text_color: 0xDDDDDD
                        long_mode: WRAP
              - obj:
                  id: cal_row_2
                  x: 0
                  y: 196
                  width: 340
                  height: 66
                  bg_color: 0x0D1F3A
                  bg_opa: 55%
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
                        id: cal_evt_2
                        x: 12
                        y: 4
                        width: 316
                        text: ""
                        text_font: montserrat_16
                        text_color: 0xEEEEEE
                        long_mode: WRAP
              - obj:
                  id: cal_row_3
                  x: 0
                  y: 262
                  width: 340
                  height: 66
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
                        id: cal_evt_3
                        x: 12
                        y: 4
                        width: 316
                        text: ""
                        text_font: montserrat_16
                        text_color: 0xDDDDDD
                        long_mode: WRAP
              - obj:
                  id: cal_row_4
                  x: 0
                  y: 328
                  width: 340
                  height: 66
                  bg_color: 0x0D1F3A
                  bg_opa: 55%
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
                        id: cal_evt_4
                        x: 12
                        y: 4
                        width: 316
                        text: ""
                        text_font: montserrat_16
                        text_color: 0xEEEEEE
                        long_mode: WRAP
              - obj:
                  id: cal_row_5
                  x: 0
                  y: 394
                  width: 340
                  height: 66
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
                        id: cal_evt_5
                        x: 12
                        y: 4
                        width: 316
                        text: ""
                        text_font: montserrat_16
                        text_color: 0xDDDDDD
                        long_mode: WRAP
              - obj:
                  id: cal_row_6
                  x: 0
                  y: 460
                  width: 340
                  height: 66
                  bg_color: 0x0D1F3A
                  bg_opa: 55%
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
                        id: cal_evt_6
                        x: 12
                        y: 4
                        width: 316
                        text: ""
                        text_font: montserrat_16
                        text_color: 0xEEEEEE
                        long_mode: WRAP
              - obj:
                  id: cal_row_7
                  x: 0
                  y: 526
                  width: 340
                  height: 66
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
                        id: cal_evt_7
                        x: 12
                        y: 4
                        width: 316
                        text: ""
                        text_font: montserrat_16
                        text_color: 0xDDDDDD
                        long_mode: WRAP

        # ── Clock background pill (top-right, ensures readability) ──
        - obj:
            width: 220
            height: 110
            align: TOP_RIGHT
            x: -10
            y: 8
            bg_color: 0x000000
            bg_opa: 50%
            radius: 14
            border_width: 0

        # ── Clock (top-right, above pill) ──────────────────────
        - label:
            id: slideshow_clock
            align: TOP_RIGHT
            x: -24
            y: 16
            text: "--:--"
            text_font: montserrat_48
            text_color: 0xFFFFFF
            bg_opa: TRANSP

        # ── Date (below clock) ─────────────────────────────────
        - label:
            id: slideshow_date_lbl
            align: TOP_RIGHT
            x: -24
            y: 80
            text: "---"
            text_font: montserrat_20
            text_color: 0xEEEEEE
            bg_opa: TRANSP

        # ── HA disconnected overlay (full screen, visible at boot) ──
        - obj:
            id: ha_disconnected_overlay
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x0A0005
            bg_opa: 82%
            border_width: 0
            pad_all: 0
            widgets:
              - image:
                  src: img_ha_offline
                  align: CENTER
                  y: -72
              - label:
                  align: CENTER
                  y: 28
                  text: "Home Assistant"
                  text_font: montserrat_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 80
                  text: "Not Connected"
                  text_font: montserrat_28
                  text_color: 0xFF5252
              - label:
                  align: CENTER
                  y: 128
                  text: "Reconnecting automatically..."
                  text_font: montserrat_18
                  text_color: 0x777777

        # ── Error bar (bottom of slideshow area only — does not cover calendar) ──
        - obj:
            id: error_bar
            x: 340
            y: 554
            width: 684
            height: 46
            bg_color: 0x7B0000
            bg_opa: 90%
            border_width: 0
            hidden: true
            widgets:
              - label:
                  id: error_lbl
                  align: LEFT_MID
                  x: 16
                  text: ""
                  text_font: montserrat_16
                  text_color: 0xFFCDD2

        # ── Tap zone (opens dashboard, hidden until HA connects) ──
        - button:
            id: tap_zone_btn
            width: 1024
            height: 554
            align: TOP_LEFT
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            hidden: true
            on_click:
              - lvgl.page.show: dashboard_page

    # ═══════════════════════════════════════════════════════════
    # PAGE 2 — DASHBOARD
    # Layout: top bar 58px | tiles 3x2 | bottom bar 50px
    #   col1 x=20  col2 x=352  col3 x=684   (width=320 each)
    #   row1 y=70  row2 y=308               (height=228 each)
    # ═══════════════════════════════════════════════════════════
    - id: dashboard_page
      bg_color: 0x090916
      widgets:
        - image:
            id: dash_bg_img
            src: immich_photo
            width: 1024
            height: 600
            align: TOP_LEFT
            opa: 31%

        - obj:
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x05050F
            bg_opa: 59%
            border_width: 0
            pad_all: 0

        # ── Top bar ────────────────────────────────────────────
        - obj:
            width: 1024
            height: 58
            align: TOP_LEFT
            bg_color: 0x12192E
            bg_opa: 96%
            border_width: 0
            border_side: BOTTOM
            border_color: 0x1E3A6E
            pad_all: 0
            widgets:
              - label:
                  id: dash_clock
                  align: LEFT_MID
                  x: 20
                  text: "--:--"
                  text_font: montserrat_32
                  text_color: 0xFFFFFF
              - label:
                  id: dash_date
                  align: CENTER
                  text: "---"
                  text_font: montserrat_18
                  text_color: 0xAAAAAA
              - label:
