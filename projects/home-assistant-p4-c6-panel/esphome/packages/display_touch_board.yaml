image:
  - file: mdi:image-outline
    id: img_no_photo
    type: grayscale
    resize: 128x128
    transparency: alpha_channel
  - file: mdi:home-off
    id: img_ha_offline
    type: grayscale
    resize: 128x128
    transparency: alpha_channel
  # Stock fallback images — downloaded once at build time, stored in flash.
  # Shown when Immich is unavailable; cycles on each slideshow tick.
  - file: https://picsum.photos/id/10/1024/600
    id: stock_img_0
    type: RGB565
    resize: 1024x600
  - file: https://picsum.photos/id/28/1024/600
    id: stock_img_1
    type: RGB565
    resize: 1024x600
  - file: https://picsum.photos/id/63/1024/600
    id: stock_img_2
    type: RGB565
    resize: 1024x600
  - file: https://picsum.photos/id/101/1024/600
    id: stock_img_3
    type: RGB565
    resize: 1024x600

globals:
  - id: immich_asset_id
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: immich_base_url
    type: std::string
    restore_value: no
    initial_value: '"${immich_url}"'
  - id: g_immich_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ha_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  # true = currently displaying an embedded stock image, not Immich
  - id: g_using_fallback
    type: bool
    restore_value: no
    initial_value: 'false'
  # Cycles through embedded stock images (0–3)
  - id: g_stock_idx
    type: int
    restore_value: no
    initial_value: '0'

# Shared online_image component used for both Immich photos and stock fallback images.
online_image:
  - id: immich_photo
    url: "${immich_url}/api/assets/placeholder/thumbnail?size=preview"
    format: JPEG
    type: RGB565
    resize: 1024x600
    buffer_size: 65536
    update_interval: never
    request_headers:
      Accept: image/jpeg
      x-api-key: !secret immich_api_key
    on_download_finished:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      - globals.set:
          id: g_immich_ok
          value: 'true'
      - lvgl.widget.show: slideshow_img
      - lvgl.widget.hide: stock_fallback_img
      - lvgl.widget.hide: slideshow_placeholder_obj
      - lvgl.widget.hide: error_bar
      - lvgl.label.update:
          id: dash_error_lbl
          text: ""
    on_error:
      - globals.set:
          id: g_immich_ok
          value: 'false'
      - lvgl.widget.show: error_bar
      - lvgl.label.update:
          id: error_lbl
          text: "Immich unavailable - showing stock image"
      - lvgl.label.update:
          id: dash_error_lbl
          text: "Immich offline"
      - script.execute: try_fallback_image

script:
  # Fetches a random Immich asset and loads it. Always resets to Immich-first mode.
  - id: refresh_immich_slideshow
    mode: restart
    then:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      - http_request.get:
          url: !lambda return id(immich_base_url) + "/api/assets/random?count=1";
          request_headers:
            Accept: application/json
            x-api-key: !secret immich_api_key
          capture_response: true
          max_response_buffer_size: 8192
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 200;
                  then:
                    - lambda: |-
                        auto doc = json::parse_json(body);
                        if (!doc.is<JsonArray>()) return;
                        JsonArray arr = doc.as<JsonArray>();
                        if (arr.size() == 0 || !arr[0]["id"].is<const char *>()) return;
                        id(immich_asset_id) = arr[0]["id"].as<const char *>();
                    - if:
                        condition:
                          lambda: return !id(immich_asset_id).empty();
                        then:
                          - online_image.set_url:
                              id: immich_photo
                              url: !lambda |-
                                return id(immich_base_url) + "/api/assets/" + id(immich_asset_id) + "/thumbnail?size=preview";
                              update: true
                  else:
                    # Immich returned an error status — try stock fallback
                    - lvgl.widget.show: error_bar
                    - lvgl.label.update:
                        id: error_lbl
                        text: !lambda |-
                          return std::string("Immich HTTP ") + std::to_string(response->status_code) + " - loading stock";
                    - script.execute: try_fallback_image
          on_error:
            then:
              # Network request to Immich failed — try stock fallback
              - lvgl.widget.show: error_bar
              - lvgl.label.update:
                  id: error_lbl
                  text: "Immich connection failed - loading stock image"
              - script.execute: try_fallback_image

  # Shows the next embedded stock image (cycles through 4 pre-downloaded images).
  # No internet required — images are stored in device flash at build time.
  - id: try_fallback_image
    mode: single
    then:
      - globals.set:
          id: g_using_fallback
          value: 'true'
      - lambda: |-
          id(g_stock_idx) = (id(g_stock_idx) + 1) % 4;
          esphome::image::Image* imgs[4] = {
            id(stock_img_0), id(stock_img_1), id(stock_img_2), id(stock_img_3)
          };
          lv_img_set_src(id(stock_fallback_img), imgs[id(g_stock_idx)]->get_lv_img_dsc());
          lv_obj_clear_flag(id(stock_fallback_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_placeholder_obj), LV_OBJ_FLAG_HIDDEN);

interval:
  - interval: "${immich_slideshow_interval}"
    then:
      - script.execute: refresh_immich_slideshow

  - interval: 1s
    then:
      - lvgl.label.update:
          id: slideshow_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: slideshow_date_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char b[20];
            snprintf(b, sizeof(b), "%s %02d %s", wd[t.day_of_week], t.day_of_month, mo[t.month - 1]);
            return std::string(b);
      - lvgl.label.update:
          id: cal_today_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[t.day_of_week], t.day_of_month, mo[t.month - 1], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: dash_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[t.day_of_week], t.day_of_month, mo[t.month - 1], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_rssi
          text: !lambda |-
            char b[12];
            snprintf(b, sizeof(b), "%.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_ha_lbl
          text: !lambda |-
            return id(g_ha_connected) ? std::string("Home Assistant: Connected") : std::string("Home Assistant: Disconnected");
      - lvgl.label.update:
          id: settings_immich_lbl
          text: !lambda |-
            return id(g_immich_ok) ? std::string("Immich: Online") : std::string("Immich: Offline");
      - lvgl.label.update:
          id: settings_ip_lbl
          text: !lambda |-
            auto ip = id(wifi_ip_addr).state;
            return std::string("Device IP: ") + (ip.empty() ? "--" : ip);
      - lvgl.label.update:
          id: settings_rssi_lbl
          text: !lambda |-
            char b[24];
            snprintf(b, sizeof(b), "Signal: %.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_immich_url_val
          text: !lambda |-
            return id(immich_base_url).empty() ? std::string("--") : id(immich_base_url);

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    hsync_pulse_width: 20
    rotation: "${rotate_display}"

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    i2c_id: bus_a
    interrupt_pin: GPIO21
    reset_pin: GPIO22
    on_touch:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: OFF

binary_sensor:
  - platform: template
    name: "Panel Touch Input"
    id: panel_touch_input

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23
    frequency: 100Hz
    min_power: 0.0
    max_power: 0.8

light:
  - platform: monochromatic
    id: panel_backlight
    name: "Panel Backlight"
    icon: mdi:television
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  bg_color: 0x000000
  on_idle:
    timeout: "${idle_timeout}"
    then:
      - lvgl.page.show: slideshow_page

  pages:
    # ═══════════════════════════════════════════════════════════
    # PAGE 1 — SLIDESHOW  (idle / lock screen)
    # Layout: full 1024x600
    #   Left  0-339px  : calendar panel (70% opaque dark bg)
    #   Right 340-1023px: Immich photo, clock pill (top-right)
    # ═══════════════════════════════════════════════════════════
    - id: slideshow_page
      bg_color: 0x000000
      widgets:
        # ── Background image (Immich or stock) ─────────────────
        - image:
            id: slideshow_img
            src: immich_photo
            width: 1024
            height: 600
            align: TOP_LEFT
            hidden: true

        # ── Stock fallback image (embedded at build time, shown when Immich unavailable) ──
        - image:
            id: stock_fallback_img
            src: stock_img_0
            width: 1024
            height: 600
            align: TOP_LEFT
            hidden: true

        # ── Static placeholder (shown when all image sources fail) ──
        - obj:
            id: slideshow_placeholder_obj
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x0D0D2B
            border_width: 0
            pad_all: 0
            widgets:
              - image:
                  src: img_no_photo
                  align: CENTER
                  y: -30
              - label:
                  align: CENTER
                  y: 72
                  text: "Photos Unavailable"
                  text_font: montserrat_24
                  text_color: 0x444466
              - label:
                  align: CENTER
                  y: 108
                  text: "Check Immich connection"
                  text_font: montserrat_18
                  text_color: 0x333355

        # ── Calendar panel (left side, 70% opaque) ─────────────
        - obj:
            id: calendar_panel
            x: 0
            y: 0
            width: 340
            height: 600
            align: TOP_LEFT
            bg_color: 0x050510
            bg_opa: 70%
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              # Title row
              - label:
                  x: 14
                  y: 10
                  text: "CALENDAR"
                  text_font: montserrat_20
                  text_color: 0x69F0AE
              # Today's date (updated every second)
              - label:
                  id: cal_today_lbl
                  x: 14
                  y: 34
                  text: "---"
                  text_font: montserrat_16
                  text_color: 0xAABBCC
              # Header divider
              - obj:
                  x: 0
                  y: 60
                  width: 340
                  height: 2
                  bg_color: 0x1E3A6E
                  border_width: 0
                  radius: 0
              # ── Event rows (8 slots, 66px each, alternating ribbon colour) ──
              # Rows start hidden; shown only when an event is assigned.
              - obj:
                  id: cal_row_0
                  x: 0
                  y: 64
                  width: 340
                  height: 66
                  bg_color: 0x0D1F3A
                  bg_opa: 55%
                  border_width: 0
                  radius: 0
                  hidden: true
                  widgets:
                    - label:
