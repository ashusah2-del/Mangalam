    transparency: alpha_channel
  # Stock fallback images — downloaded once at build time, stored in flash.
  # Shown when Immich is unavailable; cycles on each slideshow tick.
  # 1024x600 = full screen (overlaps calendar; calendar panel has bg_opa: 70%
  # so the image still shows through behind the calendar text).
  # No LVGL zoom — zoom on flash-based static images crashes the ESP32-P4
  # under PSRAM XIP, so the source size IS the displayed size.
  # 2 images at 1.23MB each = 2.46MB total embedded, well within OTA budget.
  - file: https://picsum.photos/id/10/1024/600
    id: stock_img_0
    type: RGB565
    resize: 1024x600
    byte_order: LITTLE_ENDIAN
  - file: https://picsum.photos/id/28/1024/600
    id: stock_img_1
    type: RGB565
    resize: 1024x600
    byte_order: LITTLE_ENDIAN

globals:
  - id: immich_base_url
    type: std::string
    restore_value: no
    initial_value: '"${proxy_url}"'
  - id: g_immich_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ha_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  # Tracks active API clients so refresh+VA actions only run on first-connect /
  # last-disconnect rather than on every client transition.
  - id: g_ha_client_count
    type: int
    restore_value: no
    initial_value: '0'
  # true = currently displaying an embedded stock image, not Immich
  - id: g_using_fallback
    type: bool
    restore_value: no
    initial_value: 'false'
  # Retry counter for Immich download errors (reset on success, max 3 attempts)
  - id: g_immich_retry
    type: int
    restore_value: no
    initial_value: '0'
  # Cycles through embedded stock images (0–3)
  - id: g_stock_idx
    type: int
    restore_value: no
    initial_value: '0'
  # Tado page — current target temperature per zone (updated from HA's
  # climate.X "temperature" attribute). The +/− buttons mutate these and
  # call climate.set_temperature with the new value.
  - { id: g_tado1_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado2_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado3_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado4_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado5_target, type: float, restore_value: no, initial_value: '20.0' }
  - { id: g_tado6_target, type: float, restore_value: no, initial_value: '20.0' }
  # True while the camera_view_page is foregrounded. The 3-second
  # camera-refresh interval only fires when this is set, so we don't poll
  # HA constantly when no one's looking.
  - { id: g_on_camera_view, type: bool, restore_value: no, initial_value: 'false' }
  # Bitmask of which dashboard lights are currently on. Bit i is for room i+1
  # (so bit 0 = Drawing, bit 1 = Office, …, bit 5 = Conservatory). The
  # all-lights toggle button uses this to decide whether tapping should
  # turn everything off or turn everything on.
  - { id: g_lights_on_mask, type: uint8_t, restore_value: no, initial_value: '0' }
  # Slideshow refresh interval in minutes. Sourced from HA's
  # input_number.panel_slideshow_interval helper; the 1-minute interval
  # bumps the counter and fires the refresh script when it crosses the
  # threshold. restore_value: yes so a non-default tuning survives reboot.
  - { id: g_slideshow_interval_min, type: int, restore_value: yes, initial_value: '10' }
  - { id: g_slideshow_counter_min,  type: int, restore_value: no,  initial_value: '0' }
  # Calendar overlay opacity, 0–100 %. Mirrors HA's
  # input_number.panel_calendar_opacity and is editable on the settings
  # page. restore_value: yes so a tuning sticks across reboots.
  - { id: g_calendar_opa_pct, type: int, restore_value: yes, initial_value: '70' }
  # Slideshow transition effect: 0=Fade 1=SlideLeft 2=SlideRight
  # 3=SlideUp 4=SlideDown 5=Zoom. Mirrors HA's
  # input_number.panel_transition_effect helper (if it exists; setting
  # is panel-local without it). The exit animation runs in
  # refresh_immich_slideshow before the download starts; the entry
  # animation runs from on_download_finished after the new image is
  # decoded and positioned.
  - { id: g_transition_effect, type: int, restore_value: yes, initial_value: '0' }
  # Slideshow double-buffer slot index: 0 = slideshow_img / immich_photo
  # currently visible, 1 = slideshow_img_b / immich_photo_b currently
  # visible. refresh_immich_slideshow downloads into the inactive slot
  # so the visible image is never disturbed mid-fetch; on_download_finished
  # then crossfades old → new with no blank moment.
  - { id: g_slideshow_slot, type: int, restore_value: no, initial_value: '0' }
  # True once the on_boot lambda has run — every multi-widget opacity cascade,
  # the weather-state lambda, and the weather attribute label-update lambdas
  # gate themselves on this so a HA push that arrives at boot before LVGL is
  # fully constructed can't trigger an Instruction-address-misaligned crash.
  # Flipped to true in the on_boot lambda after a 2-second delay.
  - { id: g_lvgl_ready, type: bool, restore_value: no, initial_value: 'false' }
  # If the previous boot was a real fault, on_boot writes the human-
  # readable reason here. on_client_connected fires a persistent
  # notification into HA the first time HA reconnects and clears the
  # string, so each crash produces exactly one HA-side notification.
  - { id: g_crash_report, type: std::string, restore_value: no, initial_value: '""' }
  # Calendar pagination — the HA helper pushes a single newline-separated
  # string; we cache it here and the render_calendar script splits it into
  # 8-event pages that cycle every 30 s.
  - { id: g_calendar_events_full, type: std::string, restore_value: no, initial_value: '""' }
  - { id: g_calendar_page,         type: int, restore_value: no, initial_value: '0' }

# Shared online_image component used for both Immich photos and stock fallback images.
# URL points to the local baseline-JPEG proxy (re-encodes Immich previews as guaranteed SOF0).
online_image:
  # Eufy camera thumbnails — small (300x180) JPEGs from the proxy's /camera
  # endpoint, refreshed every 60 seconds on the camera grid page.
  - id: cam1_thumb
    url: "${proxy_url}/camera/${cam1_entity}?size=thumb"
    format: JPEG
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // Refresh widget src after each download so the new frame paints
          // (compile-time src: binding points at an empty buffer at boot).
          lv_img_set_src(id(cam1_widget), id(cam1_thumb).get_lv_img_dsc());
          lv_obj_invalidate(id(cam1_widget));
  - id: cam2_thumb
    url: "${proxy_url}/camera/${cam2_entity}?size=thumb"
    format: JPEG
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // Refresh widget src after each download so the new frame paints
          // (compile-time src: binding points at an empty buffer at boot).
          lv_img_set_src(id(cam2_widget), id(cam2_thumb).get_lv_img_dsc());
          lv_obj_invalidate(id(cam2_widget));
  - id: cam3_thumb
    url: "${proxy_url}/camera/${cam3_entity}?size=thumb"
    format: JPEG
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // Refresh widget src after each download so the new frame paints
          // (compile-time src: binding points at an empty buffer at boot).
          lv_img_set_src(id(cam3_widget), id(cam3_thumb).get_lv_img_dsc());
          lv_obj_invalidate(id(cam3_widget));
  - id: cam4_thumb
    url: "${proxy_url}/camera/${cam4_entity}?size=thumb"
    format: JPEG
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 240x144
    buffer_size: 24576
    update_interval: 60s
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          // Refresh widget src after each download so the new frame paints
          // (compile-time src: binding points at an empty buffer at boot).
          lv_img_set_src(id(cam4_widget), id(cam4_thumb).get_lv_img_dsc());
          lv_obj_invalidate(id(cam4_widget));
  # Live view — single component, URL is swapped per camera on tap. The
  # update is triggered manually on page show (and via a 3s interval that
  # only fires while the camera_view_page is active, guarded by g_on_camera_view).
  - id: camera_live_img
    url: "${proxy_url}/camera/${cam1_entity}?size=full"
    format: JPEG
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 600x340
    buffer_size: 65536
    update_interval: never
    request_headers: { Accept: image/jpeg }
    on_download_finished:
      - lambda: |-
          lv_img_set_src(id(camera_live_widget), id(camera_live_img).get_lv_img_dsc());
          lv_obj_invalidate(id(camera_live_widget));

  # Slideshow uses two online_image components (immich_photo and
  # immich_photo_b) as a double-buffer. While slot A is on screen, slot
  # B downloads the next photo. When slot B's decode finishes,
  # crossfade_to_active_slot brings it forward while the old A fades/
  # slides out — so the previous image is always visible *during* the
  # transition. PSRAM cost: ~1.2 MB per slot (1024×600×RGB565).
  - id: immich_photo
    url: "${proxy_url}/random-photo"
    format: JPEG
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 1024x600
    buffer_size: 65536
    update_interval: never
    request_headers:
      Accept: image/jpeg
    on_download_finished:
      - globals.set: { id: g_using_fallback, value: 'false' }
      - globals.set: { id: g_immich_ok,      value: 'true'  }
      - globals.set: { id: g_immich_retry,   value: '0'     }
      - globals.set: { id: g_slideshow_slot, value: '0'     }
      - lambda: 'lv_img_set_src(id(dash_bg_img), id(immich_photo).get_lv_img_dsc());'
      - script.execute: crossfade_to_active_slot
      - lvgl.widget.hide: stock_fallback_img
      - lvgl.widget.hide: slideshow_placeholder_obj
      - lvgl.widget.hide: error_bar
      - lvgl.label.update: { id: dash_error_lbl, text: "" }
    on_error:
      - globals.set: { id: g_immich_ok, value: 'false' }
      - if:
          condition:
            lambda: return !id(g_using_fallback) && id(g_immich_retry) < 3;
          then:
            - globals.set: { id: g_immich_retry, value: !lambda return id(g_immich_retry) + 1; }
            # Retry into the SAME slot — refresh script picks slot based on
            # g_slideshow_slot, which hasn't been advanced on a failed load.
            - online_image.set_url:
                id: immich_photo
                url: "${proxy_url}/random-photo"
                update: true
          else:
            - globals.set: { id: g_immich_retry, value: '0' }
            - lvgl.widget.show: error_bar
            - lvgl.label.update: { id: error_lbl, text: "Immich unavailable - showing stock image" }
            - lvgl.label.update: { id: dash_error_lbl, text: "Immich offline" }
            - script.execute: try_fallback_image

  - id: immich_photo_b
    url: "${proxy_url}/random-photo"
    format: JPEG
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 1024x600
    buffer_size: 65536
    update_interval: never
    request_headers:
      Accept: image/jpeg
    on_download_finished:
      - globals.set: { id: g_using_fallback, value: 'false' }
      - globals.set: { id: g_immich_ok,      value: 'true'  }
      - globals.set: { id: g_immich_retry,   value: '0'     }
      - globals.set: { id: g_slideshow_slot, value: '1'     }
      - lambda: 'lv_img_set_src(id(dash_bg_img), id(immich_photo_b).get_lv_img_dsc());'
      - script.execute: crossfade_to_active_slot
      - lvgl.widget.hide: stock_fallback_img
      - lvgl.widget.hide: slideshow_placeholder_obj
      - lvgl.widget.hide: error_bar
      - lvgl.label.update: { id: dash_error_lbl, text: "" }
    on_error:
      - globals.set: { id: g_immich_ok, value: 'false' }
      - if:
          condition:
            lambda: return !id(g_using_fallback) && id(g_immich_retry) < 3;
          then:
            - globals.set: { id: g_immich_retry, value: !lambda return id(g_immich_retry) + 1; }
            - online_image.set_url:
                id: immich_photo_b
                url: "${proxy_url}/random-photo"
                update: true
          else:
            - globals.set: { id: g_immich_retry, value: '0' }
            - lvgl.widget.show: error_bar
            - lvgl.label.update: { id: error_lbl, text: "Immich unavailable - showing stock image" }
            - lvgl.label.update: { id: dash_error_lbl, text: "Immich offline" }
            - script.execute: try_fallback_image

script:
  # Renders the current "page" of calendar events into the 8 cal_row_N
  # slots. The HA on_value handler caches the full string in
  # g_calendar_events_full and zeroes the page; the 30-second cycle
  # interval increments g_calendar_page and re-calls this script so the
  # user sees later events without having to interact with the panel.
  - id: render_calendar
    mode: single
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;
          lv_obj_t* labels[8] = {
            id(cal_evt_0), id(cal_evt_1), id(cal_evt_2), id(cal_evt_3),
            id(cal_evt_4), id(cal_evt_5), id(cal_evt_6), id(cal_evt_7)
          };
          lv_obj_t* rows[8] = {
            id(cal_row_0), id(cal_row_1), id(cal_row_2), id(cal_row_3),
            id(cal_row_4), id(cal_row_5), id(cal_row_6), id(cal_row_7)
          };
          // Split the cached events string into a vector of non-empty lines.
          std::vector<std::string> events;
          const std::string& full = id(g_calendar_events_full);
          size_t pos = 0;
          while (pos < full.size()) {
            size_t nl = full.find('\n', pos);
            size_t end = (nl == std::string::npos) ? full.size() : nl;
            if (end > pos) events.emplace_back(full.substr(pos, end - pos));
            pos = (nl == std::string::npos) ? full.size() : nl + 1;
          }
          int total = (int)events.size();
          int pages = (total + 7) / 8;
          if (pages <= 0) pages = 1;
          // Clamp / wrap the page index.
          if (id(g_calendar_page) >= pages) id(g_calendar_page) = 0;
          if (id(g_calendar_page) < 0)      id(g_calendar_page) = 0;
          int page = id(g_calendar_page);
          // Render the slice of 8 events for this page.
          for (int i = 0; i < 8; i++) {
            int idx = page * 8 + i;
            if (total == 0 && i == 0) {
              lv_label_set_text(labels[i], "No events this week");
              lv_obj_clear_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            } else if (idx < total) {
              std::string ev = events[idx];
              // Replace en-dash (U+2013, UTF-8: E2 80 93) and em-dash (U+2014, UTF-8: E2 80 94)
              // with ASCII hyphen — LVGL built-in fonts don't include these glyphs.
              for (size_t p = 0; p + 2 < ev.size(); ) {
                if ((unsigned char)ev[p] == 0xE2 && (unsigned char)ev[p+1] == 0x80 &&
                    ((unsigned char)ev[p+2] == 0x93 || (unsigned char)ev[p+2] == 0x94)) {
                  ev.replace(p, 3, "-");
                } else { p++; }
              }
              lv_label_set_text(labels[i], ev.c_str());
              lv_obj_clear_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_label_set_text(labels[i], "");
              lv_obj_add_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            }
          }
          // Page indicator at the bottom of the panel.
          char b[16];
          if (pages > 1) snprintf(b, sizeof(b), "%d/%d", page + 1, pages);
          else b[0] = '\0';
          lv_label_set_text(id(cal_page_lbl), b);

  # Fetches a random baseline JPEG from the local proxy and displays it.
  # The proxy (immich-proxy.service on the Docker host) handles Immich API calls
  # and re-encodes all images as guaranteed SOF0 baseline JPEG before serving.
  - id: refresh_immich_slideshow
    mode: restart
    then:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      # Double-buffered slideshow: kick off the download into the slot
      # that's currently NOT on screen. The visible slot keeps painting
      # at full opacity throughout the fetch+decode (no exit animation
      # here). When the new buffer finishes, on_download_finished triggers
      # crossfade_to_active_slot, which runs the slide/fade/zoom on both
      # widgets simultaneously so the previous image overlaps the new
      # one mid-transition.
      - if:
          condition:
            lambda: 'return id(g_slideshow_slot) == 0;'
          then:
            - online_image.set_url:
                id: immich_photo_b
                url: "${proxy_url}/random-photo"
                update: true
          else:
            - online_image.set_url:
                id: immich_photo
                url: "${proxy_url}/random-photo"
                update: true

  # Crossfade the just-loaded slot in while the previously-visible slot
  # transitions out, with both animations running simultaneously so the
  # images overlap. g_slideshow_slot must already be set to the *new*
  # active slot before this script is executed. Effect (fade / slide /
  # zoom) is chosen via g_transition_effect from the settings cycler.
  - id: crossfade_to_active_slot
    mode: restart
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;
          bool a_active = (id(g_slideshow_slot) == 0);
          lv_obj_t* in  = a_active ? id(slideshow_img)   : id(slideshow_img_b);
          lv_obj_t* out = a_active ? id(slideshow_img_b) : id(slideshow_img);
          auto dsc = a_active ? id(immich_photo).get_lv_img_dsc()
                              : id(immich_photo_b).get_lv_img_dsc();
          // Repoint the incoming widget at the freshly decoded buffer
          // (LVGL 9: compile-time src binding doesn't re-resolve).
          lv_img_set_src(in, dsc);
          int final_x = 0, final_y = 0;
          if (dsc != nullptr && dsc->header.w > 0 && dsc->header.h > 0) {
            final_x = (1024 - (int)dsc->header.w) / 2;
            final_y = (600  - (int)dsc->header.h) / 2;
          }
          // Both widgets must be visible during the transition. Use
          // move_background so they sit at the bottom of the slideshow
          // page's child stack — *behind* calendar_panel, clock_pill,
          // weather_widget, etc. The two background calls in this order
          // park 'out' at index 0 and 'in' at index 1, so 'in' still
          // renders on top of 'out' during the crossfade but both are
          // below every overlay widget.
          lv_obj_clear_flag(in,  LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(out, LV_OBJ_FLAG_HIDDEN);
          lv_obj_move_background(in);
          lv_obj_move_background(out);

          const int T = 1500;
          int e = id(g_transition_effect);
          switch (e) {
            case 0: {  // Crossfade — new fades up while old fades out
              lv_obj_set_pos(in, final_x, final_y);
              lv_img_set_zoom(in, 256);
              lv_obj_set_style_opa(in, 0, 0);
              lv_obj_fade_in(in, T, 0);
              lv_obj_fade_out(out, T, 0);
              break;
            }
            case 1: case 2: case 3: case 4: {  // Slides — both translate
              int in_start_x = final_x, in_start_y = final_y;
              int out_start_x = lv_obj_get_x(out), out_start_y = lv_obj_get_y(out);
              int out_end_x = out_start_x, out_end_y = out_start_y;
              if (e == 1)      { in_start_x = 1024;  out_end_x = -1024; }
              else if (e == 2) { in_start_x = -1024; out_end_x = 1024;  }
              else if (e == 3) { in_start_y = 600;   out_end_y = -600;  }
              else             { in_start_y = -600;  out_end_y = 600;   }
              lv_obj_set_pos(in, in_start_x, in_start_y);
              lv_img_set_zoom(in, 256);
              lv_obj_set_style_opa(in, 255, 0);
              lv_obj_set_style_opa(out, 255, 0);
              // Animate incoming → final
              lv_anim_t ai;
              lv_anim_init(&ai);
              lv_anim_set_var(&ai, in);
              lv_anim_set_time(&ai, T);
              lv_anim_set_path_cb(&ai, lv_anim_path_ease_in_out);
              if (e == 1 || e == 2) {
                lv_anim_set_values(&ai, in_start_x, final_x);
                lv_anim_set_exec_cb(&ai, (lv_anim_exec_xcb_t)lv_obj_set_x);
              } else {
                lv_anim_set_values(&ai, in_start_y, final_y);
                lv_anim_set_exec_cb(&ai, (lv_anim_exec_xcb_t)lv_obj_set_y);
              }
              lv_anim_start(&ai);
              // Animate outgoing → off-screen
              lv_anim_t ao;
              lv_anim_init(&ao);
              lv_anim_set_var(&ao, out);
              lv_anim_set_time(&ao, T);
              lv_anim_set_path_cb(&ao, lv_anim_path_ease_in_out);
              if (e == 1 || e == 2) {
                lv_anim_set_values(&ao, out_start_x, out_end_x);
                lv_anim_set_exec_cb(&ao, (lv_anim_exec_xcb_t)lv_obj_set_x);
              } else {
                lv_anim_set_values(&ao, out_start_y, out_end_y);
                lv_anim_set_exec_cb(&ao, (lv_anim_exec_xcb_t)lv_obj_set_y);
              }
              lv_anim_start(&ao);
              break;
            }
            case 5: {  // Zoom — new grows + fades in, old shrinks + fades out
              lv_obj_set_pos(in, final_x, final_y);
              lv_img_set_zoom(in, 64);
              lv_obj_set_style_opa(in, 0, 0);
              lv_obj_fade_in(in, T, 0);
              lv_anim_t ai;
              lv_anim_init(&ai);
              lv_anim_set_var(&ai, in);
              lv_anim_set_time(&ai, T);
              lv_anim_set_path_cb(&ai, lv_anim_path_ease_in_out);
              lv_anim_set_values(&ai, 64, 256);
              lv_anim_set_exec_cb(&ai, (lv_anim_exec_xcb_t)lv_img_set_zoom);
              lv_anim_start(&ai);
              lv_obj_fade_out(out, T, 0);
              lv_anim_t ao;
              lv_anim_init(&ao);
              lv_anim_set_var(&ao, out);
              lv_anim_set_time(&ao, T);
              lv_anim_set_path_cb(&ao, lv_anim_path_ease_in_out);
              lv_anim_set_values(&ao, 256, 64);
              lv_anim_set_exec_cb(&ao, (lv_anim_exec_xcb_t)lv_img_set_zoom);
              lv_anim_start(&ao);
              break;
            }
          }
          // The lv_anim_t callbacks invalidate dirty rects per frame; an
          // extra explicit invalidate here would force a second full
          // redraw on top of every step and contributes to flicker.

  # Shows the next embedded stock image (cycles through 2 pre-downloaded images).
  # No internet required — images are stored in device flash at build time.
  - id: try_fallback_image
    mode: single
    then:
      - globals.set:
          id: g_using_fallback
          value: 'true'
      - lambda: |-
          id(g_stock_idx) = (id(g_stock_idx) + 1) % 2;
          lv_obj_t* stock_imgs[2] = {
            id(stock_fallback_img_0), id(stock_fallback_img_1),
          };
          for (int i = 0; i < 2; i++) {
            if (i == id(g_stock_idx))
              lv_obj_clear_flag(stock_imgs[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(stock_imgs[i], LV_OBJ_FLAG_HIDDEN);
          }
          lv_obj_clear_flag(id(stock_fallback_img), LV_OBJ_FLAG_HIDDEN);
          // Hide both slideshow slots so the stock image is unobstructed.
          lv_obj_add_flag(id(slideshow_img),   LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_img_b), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(slideshow_placeholder_obj), LV_OBJ_FLAG_HIDDEN);

interval:
  # Slideshow refresh — fires every minute, only executes the refresh
  # script once the per-minute counter reaches the configured interval
  # (g_slideshow_interval_min). The interval is sourced from HA's
  # input_number.panel_slideshow_interval helper so it's runtime-tunable.
  - interval: 1min
    then:
      - lambda: |-
          id(g_slideshow_counter_min)++;
          if (id(g_slideshow_counter_min) >= id(g_slideshow_interval_min)) {
            id(g_slideshow_counter_min) = 0;
            id(refresh_immich_slideshow).execute();
          }

  # Calendar pagination — every 30 s the page index advances; the script
  # wraps it to 0 once we run out of events, and resets cal_page_lbl to
  # "" automatically when there's only one page so the indicator just
  # disappears if nothing's overflowing.
  - interval: 30s
    then:
      - lambda: 'id(g_calendar_page)++;'
      - script.execute: render_calendar

  # (Removed) Live-view auto-refresh — the 3-second interval kept
  # g_on_camera_view stuck true after the page closed and hammered the
  # panel with 800×500 JPEG decodes, eventually crashing it with
  # "Instruction address misaligned". Live view now refreshes only when
  # the user taps a camera tile.

  - interval: 1s
    then:
      - lvgl.label.update:
          id: slideshow_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: slideshow_date_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            // ESPTime::day_of_week is 1..7 (Sunday=1) — must subtract 1 to index a
            // 0-based 7-element array. wd[7] is out-of-bounds → crash on Saturdays.
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[20];
            snprintf(b, sizeof(b), "%s %02d %s", wd[wi], t.day_of_month, mo[mi]);
            return std::string(b);
      - lvgl.label.update:
          id: cal_today_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[wi], t.day_of_month, mo[mi], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: dash_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            int wi = (int)t.day_of_week - 1;
            int mi = (int)t.month - 1;
            if (wi < 0 || wi > 6) wi = 0;
            if (mi < 0 || mi > 11) mi = 0;
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[wi], t.day_of_month, mo[mi], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_rssi
          text: !lambda |-
            char b[12];
            snprintf(b, sizeof(b), "%.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_ha_lbl
          text: !lambda |-
            return id(g_ha_connected) ? std::string("Home Assistant: Connected") : std::string("Home Assistant: Disconnected");
      - lvgl.label.update:
          id: settings_immich_lbl
          text: !lambda |-
            return id(g_immich_ok) ? std::string("Immich: Online") : std::string("Immich: Offline");
      - lvgl.label.update:
          id: settings_ip_lbl
          text: !lambda |-
            auto ip = id(wifi_ip_addr).state;
            return std::string("Device IP: ") + (ip.empty() ? "--" : ip);
      - lvgl.label.update:
          id: settings_rssi_lbl
          text: !lambda |-
            char b[24];
            snprintf(b, sizeof(b), "Signal: %.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);
      - lvgl.label.update:
          id: settings_immich_url_val
          text: !lambda |-
            return id(immich_base_url).empty() ? std::string("--") : id(immich_base_url);

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    hsync_pulse_width: 20
    rotation: "${rotate_display}"

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    i2c_id: bus_a
    interrupt_pin: GPIO21
    reset_pin: GPIO22
    on_touch:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: OFF

binary_sensor:
  - platform: template
    name: "Panel Touch Input"
    id: panel_touch_input

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23
    frequency: 100Hz
    min_power: 0.0
    max_power: 0.8

light:
  - platform: monochromatic
    id: panel_backlight
    name: "Panel Backlight"
    icon: mdi:television
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  byte_order: little_endian
  bg_color: 0x000000
  # Full-screen render buffer (default is 25 % of screen). Without this
  # LVGL splits each frame into 4 partial sub-frames and dispatches them
  # to the MIPI DSI driver as the LCD is mid-scan — visible as tearing
  # during the slideshow transitions. Full buffer = LVGL composes the
  # whole frame before flushing, so the panel reads a coherent image.
  # Costs ~1.2 MB PSRAM (1024 × 600 × RGB565), easily affordable.
  buffer_size: 100%
  on_idle:
    timeout: "${idle_timeout}"
    then:
      - lvgl.page.show: slideshow_page

  pages:
    # ═══════════════════════════════════════════════════════════
    # PAGE 1 — SLIDESHOW  (idle / lock screen)
    # Layout: full 1024x600
    #   Left  0-339px  : calendar panel (70% opaque dark bg)
    #   Right 340-1023px: Immich photo, clock pill (top-right)
    # ═══════════════════════════════════════════════════════════
    - id: slideshow_page
      bg_color: 0x000000
      widgets:
        # ── Background image (Immich or stock) ─────────────────
        # No explicit width/height — the widget auto-sizes to the actual
        # decoded image buffer. With explicit dimensions LVGL reads with
        # the WIDGET's stride (684×2 bytes/row) instead of the BUFFER's
        # (512×2 bytes/row), producing vertical-stripe corruption.
        # Position is updated to the slideshow area in the lambda below.
        - image:
            id: slideshow_img
            src: immich_photo
            x: 340
            y: 0
            hidden: true
        # Slot B of the double-buffered slideshow. Initially hidden — the
        # first download lands in slot B (because g_slideshow_slot starts
        # at 0, refresh_immich_slideshow targets the *inactive* slot), so
        # B becomes visible and slot A's empty buffer stays hidden until
        # the next refresh swaps them.
        - image:
            id: slideshow_img_b
            src: immich_photo_b
            x: 340
            y: 0
            hidden: true

        # ── Stock fallback images — container + 2 full-screen children ──
        # Container toggled by on_download_finished/on_error; inner images cycled via try_fallback_image.
        # Images are 1024x600 (full screen). Calendar panel sits on top with
        # bg_opa: 70% so the image shows through behind the text.
        - obj:
            id: stock_fallback_img
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            hidden: true
            widgets:
              - image:
                  id: stock_fallback_img_0
                  src: stock_img_0
                  align: TOP_LEFT
                  x: 0
                  y: 0
              - image:
                  id: stock_fallback_img_1
                  src: stock_img_1
                  align: TOP_LEFT
                  x: 0
                  y: 0
                  hidden: true

        # ── Static placeholder (shown when all image sources fail) ──
        - obj:
            id: slideshow_placeholder_obj
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x0D0D2B
            border_width: 0
            pad_all: 0
            widgets:
              - image:
                  src: img_no_photo
                  align: CENTER
                  y: -30
              - label:
                  align: CENTER
                  y: 72
                  text: "Photos Unavailable"
                  text_font: montserrat_24
                  text_color: 0x444466
              - label:
                  align: CENTER
                  y: 108
                  text: "Check Immich connection"
                  text_font: montserrat_18
                  text_color: 0x333355

        # ── Weather widget (top-right, transparent) ────────────
        # Stack of 9 mdi:weather-* icons at the same coordinates; the
        # weather_state on_value lambda reveals exactly one at a time and
        # recolours it by condition. Temperature + condition labels live
        # alongside. Background is fully transparent so the slideshow
        # photo shows through.
        - obj:
            id: weather_widget
            align: BOTTOM_RIGHT
            x: -14
            y: -14
            width: 210
            height: 224
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              # Location label at the very top of the widget.
              - label:
                  id: wx_location_lbl
                  align: TOP_MID
                  y: 0
                  text: "${weather_location}"
                  text_font: montserrat_16
                  text_color: 0xDDDDDD
              # Stack of 9 condition icons; only the one matching state stays visible.
              - image: { id: wx_sunny,       src: img_wx_sunny,       align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_night,       src: img_wx_night,       align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_cloudy,      src: img_wx_cloudy,      align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_partlycloudy, src: img_wx_partlycloudy, align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_rainy,       src: img_wx_rainy,       align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_snowy,       src: img_wx_snowy,       align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_fog,         src: img_wx_fog,         align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_lightning,   src: img_wx_lightning,   align: TOP_MID, y: 22, hidden: true }
              - image: { id: wx_windy,       src: img_wx_windy,       align: TOP_MID, y: 22, hidden: true }
              - label:
                  id: wx_temp_lbl
                  align: TOP_MID
                  y: 122
                  text: "--°"
                  text_font: montserrat_36
                  text_color: 0xFFFFFF
              - label:
                  id: wx_cond_lbl
                  align: TOP_MID
                  y: 174
                  text: "—"
                  text_font: montserrat_16
                  text_color: 0xCCCCCC
              # Humidity sits below the condition. Cyan tint so it doesn't
              # compete with the condition-coloured label above it.
              - label:
                  id: wx_humidity_lbl
                  align: TOP_MID
                  y: 198
                  text: "--% RH"
                  text_font: montserrat_16
                  text_color: 0x66CCFF

        # ── Calendar panel (left side, 70% opaque) ─────────────
        - obj:
            id: calendar_panel
            x: 0
            y: 0
            width: 340
            height: 600
            align: TOP_LEFT
            bg_color: 0x050510
            bg_opa: 70%
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              # Title row (centered)
              - label:
                  align: TOP_MID
                  y: 10
                  text: "CALENDAR"
                  text_font: montserrat_20
