              # All-lights master toggle — single button at the leftmost
              # position. Label and color flip based on g_lights_on_mask
              # (updated by each roomN_state lambda). If any light is on,
              # tapping turns everything off; if all are off, tapping turns
              # everything on.
              - button:
                  id: all_lights_btn
                  align: LEFT_MID
                  x: 180
                  width: 150
                  height: 34
                  bg_color: 0x2A2A14
                  radius: 8
                  border_width: 0
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(g_lights_on_mask) != 0;'
                        then:
                          - homeassistant.service:
                              service: light.turn_off
                              data: { entity_id: "${room2_light}" }
                          - homeassistant.service:
                              service: light.turn_off
                              data: { entity_id: "${room3_light}" }
                          - homeassistant.service:
                              service: light.turn_off
                              data: { entity_id: "${room4_light}" }
