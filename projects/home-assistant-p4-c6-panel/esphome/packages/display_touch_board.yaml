    # ═══════════════════════════════════════════════════════════
    # PAGE 6 — CAMERA LIVE VIEW (opened by tapping a camera tile)
    # Shows the selected camera at 800×500 max, refreshing every 3s
    # via the camera-refresh interval (gated on g_on_camera_view).
    # Tap "Back" or swipe right to return to the camera grid.
    # ═══════════════════════════════════════════════════════════
    - id: camera_view_page
      bg_color: 0x000000
      on_swipe_right:
        - globals.set: { id: g_on_camera_view, value: 'false' }
        - lvgl.page.show: camera_page
      widgets:
        - obj:
            width: 1024
            height: 58
            align: TOP_LEFT
            bg_color: 0x12192E
            bg_opa: 96%
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: camera_view_title
                  align: CENTER
                  text: "Camera"
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
