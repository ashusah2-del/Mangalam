image:
  - file: mdi:image-outline
    id: img_no_photo
    type: grayscale
    resize: 128x128
    transparency: alpha_channel
  - file: mdi:home-off
    id: img_ha_offline
    type: grayscale
    resize: 128x128
    transparency: alpha_channel

globals:
  - id: immich_asset_id
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: immich_base_url
    type: std::string
    restore_value: no
    initial_value: '"${immich_url}"'
  - id: g_immich_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ha_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  # Tracks whether we are showing a stock fallback image instead of Immich.
  # When true, on_error shows the static placeholder; when false, it tries stock first.
  - id: g_using_fallback
    type: bool
    restore_value: no
    initial_value: 'false'

# Shared online_image component used for both Immich photos and stock fallback images.
online_image:
  - id: immich_photo
    url: "${immich_url}/api/assets/placeholder/thumbnail?size=thumbnail"
    format: JPEG
    type: RGB565
    resize: 1024x600
    buffer_size: 32768
    update_interval: never
    request_headers:
      Accept: image/jpeg
      x-api-key: !secret immich_api_key
    on_download_finished:
      - globals.set:
          id: g_immich_ok
          value: 'true'
      - lvgl.widget.show: slideshow_img
      - lvgl.widget.hide: slideshow_placeholder_obj
      - if:
          condition:
            lambda: return id(g_using_fallback);
          then:
            # Immich offline but stock loaded — keep error visible so user knows
            - lvgl.widget.show: error_bar
            - lvgl.label.update:
                id: error_lbl
                text: "Immich offline - showing stock image"
            - lvgl.label.update:
                id: dash_error_lbl
                text: "Immich offline - stock image"
          else:
            - lvgl.widget.hide: error_bar
            - lvgl.label.update:
                id: dash_error_lbl
                text: ""
    on_error:
      - if:
          condition:
            lambda: return !id(g_using_fallback);
          then:
            # Immich download failed — try a stock image from the internet
            - lvgl.widget.show: error_bar
            - lvgl.label.update:
                id: error_lbl
                text: "Immich unavailable - loading stock image"
            - script.execute: try_fallback_image
          else:
            # Stock image also failed — nothing to show, use static placeholder
            - globals.set:
                id: g_immich_ok
                value: 'false'
            - lvgl.widget.hide: slideshow_img
            - lvgl.widget.show: slideshow_placeholder_obj
            - lvgl.widget.show: error_bar
            - lvgl.label.update:
                id: error_lbl
                text: "Immich & internet unavailable"
            - lvgl.label.update:
                id: dash_error_lbl
                text: "No photos available"

script:
  # Fetches a random Immich asset and loads it. Always resets to Immich-first mode.
  - id: refresh_immich_slideshow
    mode: restart
    then:
      - globals.set:
          id: g_using_fallback
          value: 'false'
      - http_request.get:
          url: !lambda return id(immich_base_url) + "/api/assets/random?count=1";
          request_headers:
            Accept: application/json
            x-api-key: !secret immich_api_key
          capture_response: true
          max_response_buffer_size: 8192
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 200;
                  then:
                    - lambda: |-
                        auto doc = json::parse_json(body);
                        if (!doc.is<JsonArray>()) return;
                        JsonArray arr = doc.as<JsonArray>();
                        if (arr.size() == 0 || !arr[0]["id"].is<const char *>()) return;
                        id(immich_asset_id) = arr[0]["id"].as<const char *>();
                    - if:
                        condition:
                          lambda: return !id(immich_asset_id).empty();
                        then:
                          - online_image.set_url:
                              id: immich_photo
                              url: !lambda |-
                                return id(immich_base_url) + "/api/assets/" + id(immich_asset_id) + "/thumbnail?size=thumbnail";
                              update: true
                  else:
                    # Immich returned an error status — try stock fallback
                    - lvgl.widget.show: error_bar
                    - lvgl.label.update:
                        id: error_lbl
                        text: !lambda |-
                          return std::string("Immich HTTP ") + std::to_string(response->status_code) + " - loading stock";
                    - script.execute: try_fallback_image
          on_error:
            then:
              # Network request to Immich failed — try stock fallback
              - lvgl.widget.show: error_bar
              - lvgl.label.update:
                  id: error_lbl
                  text: "Immich connection failed - loading stock image"
              - script.execute: try_fallback_image

  # Loads a stock image from picsum.photos as a fallback when Immich is offline.
  # Cycles through 10 seeds based on millis so images vary over time.
  - id: try_fallback_image
    mode: single
    then:
      - globals.set:
          id: g_using_fallback
          value: 'true'
      - online_image.set_url:
          id: immich_photo
          url: !lambda |-
            int idx = (millis() / 1000) % 10 + 1;
            return std::string("https://picsum.photos/seed/homepanel") + std::to_string(idx) + "/1024/600";
          update: true

interval:
  - interval: "${immich_slideshow_interval}"
    then:
      - script.execute: refresh_immich_slideshow

  - interval: 1s
    then:
      - lvgl.label.update:
          id: slideshow_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: slideshow_date_lbl
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char b[20];
            snprintf(b, sizeof(b), "%s %02d %s", wd[t.day_of_week], t.day_of_month, mo[t.month - 1]);
            return std::string(b);
      - lvgl.label.update:
          id: dash_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[6];
            snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: dash_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            static const char *wd[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static const char *mo[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char b[24];
            snprintf(b, sizeof(b), "%s %02d %s %04d", wd[t.day_of_week], t.day_of_month, mo[t.month - 1], t.year);
            return std::string(b);
      - lvgl.label.update:
          id: dash_rssi
          text: !lambda |-
            char b[12];
            snprintf(b, sizeof(b), "%.0f dBm", id(panel_wifi_rssi).state);
            return std::string(b);

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    hsync_pulse_width: 20
    rotation: "${rotate_display}"

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    i2c_id: bus_a
    interrupt_pin: GPIO21
    reset_pin: GPIO22
    on_touch:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: panel_touch_input
            state: OFF

binary_sensor:
  - platform: template
    name: "Panel Touch Input"
    id: panel_touch_input

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23
    frequency: 100Hz
    min_power: 0.0
    max_power: 0.8

light:
  - platform: monochromatic
    id: panel_backlight
    name: "Panel Backlight"
    icon: mdi:television
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  bg_color: 0x000000
  on_idle:
    timeout: "${idle_timeout}"
    then:
      - lvgl.page.show: slideshow_page

  pages:
    # ═══════════════════════════════════════════════════════════
    # PAGE 1 — SLIDESHOW  (idle / lock screen)
    # Layout: full 1024x600
    #   Left  0-339px  : calendar panel (70% opaque dark bg)
    #   Right 340-1023px: Immich photo, clock pill (top-right)
    # ═══════════════════════════════════════════════════════════
    - id: slideshow_page
      bg_color: 0x000000
      widgets:
        # ── Background image (Immich or stock) ─────────────────
        - image:
            id: slideshow_img
            src: immich_photo
            width: 1024
            height: 600
            align: TOP_LEFT
            hidden: true

        # ── Static placeholder (shown when both Immich and stock fail) ──
        - obj:
            id: slideshow_placeholder_obj
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x0D0D2B
            border_width: 0
            pad_all: 0
            widgets:
              - image:
                  src: img_no_photo
                  align: CENTER
                  y: -30
              - label:
                  align: CENTER
                  y: 72
                  text: "Photos Unavailable"
                  text_font: montserrat_24
                  text_color: 0x444466
              - label:
                  align: CENTER
                  y: 108
                  text: "Check Immich connection"
                  text_font: montserrat_18
                  text_color: 0x333355

        # ── Calendar panel (left side, 70% opaque) ─────────────
        - obj:
            id: calendar_panel
            x: 0
            y: 0
            width: 340
            height: 600
            align: TOP_LEFT
            bg_color: 0x050510
            bg_opa: 70%
            border_width: 0
            radius: 0
            pad_left: 16
            pad_right: 14
            pad_top: 18
            pad_bottom: 16
            widgets:
              - label:
                  align: TOP_LEFT
                  text: "This Week"
                  text_font: montserrat_22
                  text_color: 0x69F0AE
              - obj:
                  # divider line
                  align: TOP_LEFT
                  y: 36
                  width: 308
                  height: 2
                  bg_color: 0x1E3A6E
                  border_width: 0
                  radius: 0
              - label:
                  id: calendar_events_lbl
                  align: TOP_LEFT
                  y: 52
                  width: 308
                  text: "Loading..."
                  text_font: montserrat_18
                  text_color: 0xEEEEEE
                  long_mode: WRAP

        # ── Clock background pill (top-right, ensures readability) ──
        - obj:
            width: 220
            height: 110
            align: TOP_RIGHT
            x: -10
            y: 8
            bg_color: 0x000000
            bg_opa: 50%
            radius: 14
            border_width: 0

        # ── Clock (top-right, above pill) ──────────────────────
        - label:
            id: slideshow_clock
            align: TOP_RIGHT
            x: -24
            y: 16
            text: "--:--"
            text_font: montserrat_48
            text_color: 0xFFFFFF
            bg_opa: TRANSP

        # ── Date (below clock) ─────────────────────────────────
        - label:
            id: slideshow_date_lbl
            align: TOP_RIGHT
            x: -24
            y: 80
            text: "---"
            text_font: montserrat_20
            text_color: 0xEEEEEE
            bg_opa: TRANSP

        # ── HA disconnected overlay (full screen, visible at boot) ──
        - obj:
            id: ha_disconnected_overlay
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x0A0005
            bg_opa: 82%
            border_width: 0
            pad_all: 0
            widgets:
              - image:
                  src: img_ha_offline
                  align: CENTER
                  y: -72
              - label:
                  align: CENTER
                  y: 28
                  text: "Home Assistant"
                  text_font: montserrat_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 80
                  text: "Not Connected"
                  text_font: montserrat_28
                  text_color: 0xFF5252
              - label:
                  align: CENTER
                  y: 128
                  text: "Reconnecting automatically..."
                  text_font: montserrat_18
                  text_color: 0x777777

        # ── Error bar (bottom, shown on Immich / network errors) ──
        - obj:
            id: error_bar
            width: 1024
            height: 46
            align: BOTTOM_LEFT
            bg_color: 0x7B0000
            bg_opa: 90%
            border_width: 0
            hidden: true
            widgets:
              - label:
                  id: error_lbl
                  align: LEFT_MID
                  x: 16
                  text: ""
                  text_font: montserrat_16
                  text_color: 0xFFCDD2

        # ── Tap zone (opens dashboard, hidden until HA connects) ──
        - button:
            id: tap_zone_btn
            width: 1024
            height: 554
            align: TOP_LEFT
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            hidden: true
            on_click:
              - lvgl.page.show: dashboard_page

    # ═══════════════════════════════════════════════════════════
    # PAGE 2 — DASHBOARD
    # Layout: top bar 58px | tiles 3x2 | bottom bar 50px
    #   col1 x=20  col2 x=352  col3 x=684   (width=320 each)
    #   row1 y=70  row2 y=308               (height=228 each)
    # ═══════════════════════════════════════════════════════════
    - id: dashboard_page
      bg_color: 0x090916
      widgets:
        - image:
            id: dash_bg_img
            src: immich_photo
            width: 1024
            height: 600
            align: TOP_LEFT
            opa: 31%

        - obj:
            width: 1024
            height: 600
            align: TOP_LEFT
            bg_color: 0x05050F
            bg_opa: 59%
            border_width: 0
            pad_all: 0

        # ── Top bar ────────────────────────────────────────────
        - obj:
            width: 1024
            height: 58
            align: TOP_LEFT
            bg_color: 0x12192E
            bg_opa: 96%
            border_width: 0
            border_side: BOTTOM
            border_color: 0x1E3A6E
            pad_all: 0
            widgets:
              - label:
                  id: dash_clock
                  align: LEFT_MID
                  x: 20
                  text: "--:--"
                  text_font: montserrat_32
                  text_color: 0xFFFFFF
              - label:
                  id: dash_date
                  align: CENTER
                  text: "---"
                  text_font: montserrat_18
                  text_color: 0xAAAAAA
              - label:
                  id: dash_rssi
                  align: RIGHT_MID
                  x: -20
                  text: "---"
                  text_font: montserrat_16
                  text_color: 0x69F0AE

        # ── Tiles ──────────────────────────────────────────────
        - button:
            id: tile_btn_1
            x: 20
            y: 70
            width: 320
            height: 228
            align: TOP_LEFT
            bg_color: 0x162044
